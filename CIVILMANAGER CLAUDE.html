<html lang="es">

<meta name="viewport" content="width=device-width,initial-scale=1">

<title>CIVILCORE - CIVILMANAGER</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@300;400;500;600;700&family=Bebas+Neue&display=swap" rel="stylesheet">

<style>

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

--bg:#060810;--bg2:#0D1525;--bg3:#131A2B;--bg4:#1A2438;

--bd:#1E2B42;--bd2:#1B2840;--bd3:#0F1A2E;--bdr:#2A3A55;

--tx:#DDE4F0;--tx2:#8A9BB8;--tx3:#4A5978;

--ac:#4D8FF7;--ac2:#3A7AE0;--warn:#E8A830;--err:#E84848;--ok:#34C759;

--r:6px;

--xl-hd:#0C1320;--xl-hd-tx:#6B7FA0;--xl-rn:#0A1019;--xl-rn-tx:#3A4A64;

--xl-row-alt:rgba(19,26,43,.35);--xl-hover:rgba(77,143,247,.06);

--xl-sel:rgba(77,143,247,.12);--xl-focus:rgba(77,143,247,.18);

--xl-grid:#2A3A58;

}

html,body{height:100%;overflow:hidden}

body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:11px}

#root{height:100%;display:flex;flex-direction:column}

::-webkit-scrollbar{width:5px;height:5px}

::-webkit-scrollbar-track{background:var(--bg2)}

::-webkit-scrollbar-thumb{background:#4ade80;border-radius:3px}

::-webkit-scrollbar-thumb:hover{background:#22c55e}



.topbar{flex-shrink:0;height:38px;background:linear-gradient(90deg,var(--bg),var(--bg2));border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px}

.topbar .logo{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px}

.topbar .logo .c1{color:var(--ac)}

.topbar .logo .c2{color:var(--tx)}

.topbar .badge{font-family:'JetBrains Mono',monospace;font-size:7px;background:var(--bg3);border:1px solid var(--bd);padding:1px 7px;border-radius:10px;color:var(--tx3);letter-spacing:.5px}



.tabbar{flex-shrink:0;display:flex;align-items:center;background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 8px;gap:2px;overflow-x:auto;overflow-y:hidden}

.tabbar button{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 16px;cursor:pointer;white-space:nowrap;transition:all .12s;letter-spacing:.5px;font-weight:500;display:inline-flex;align-items:center;gap:6px}

.tabbar button:hover{color:var(--ac);background:rgba(77,143,247,.06)}

.tabbar button.active{color:var(--ac);border-bottom-color:var(--ac);background:rgba(77,143,247,.08)}

.sec-bar button.active{color:#4ade80!important;border-bottom-color:#4ade80!important;background:rgba(74,222,128,.08)!important}

.sec-bar button.active svg{stroke:#4ade80!important}



.main{flex:1;overflow:hidden;padding:12px 16px}



.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}

.sec-hdr .title{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:var(--ac);letter-spacing:1px}

.sec-hdr .info{font-size:9px;color:var(--tx3)}

.sec-hdr .info b{color:var(--warn)}



.xl-wrap{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:var(--bg2);margin-bottom:10px}

.xl-scroll{overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 245px);position:relative}

.xl-scroll table{border-collapse:separate;border-spacing:0}

.xl-scroll table thead{position:sticky;top:0;z-index:2}

.xl-scroll table thead th{border-bottom:1px solid var(--bdr)}

.xl-scroll table tbody tr:last-child td{background:var(--bg3)}

.xl-scroll::-webkit-scrollbar{width:5px;height:5px}

.xl-scroll::-webkit-scrollbar-track{background:var(--bg3)}

.xl-scroll::-webkit-scrollbar-thumb{background:#4ade80;border-radius:3px}

.xl-foot{display:flex;align-items:center;gap:6px;padding:6px 8px;border-top:1px solid var(--bdr);background:var(--bg3);overflow:hidden;flex-shrink:0}



table{width:100%;border-collapse:collapse;font-family:'Inter',sans-serif;font-size:11px;table-layout:fixed}



colgroup .col-rn{width:30px}



th{background:var(--xl-hd);color:var(--tx2);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;padding:5px 6px;text-align:center;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);white-space:nowrap;user-select:none}

th:last-child{border-right:none}

th.col-rn{background:var(--xl-rn);color:var(--xl-rn-tx);text-align:center;border-right:2px solid var(--bd)}

th.col-act{background:var(--xl-rn);letter-spacing:.8px;padding:4px 6px;width:80px;overflow:visible;text-align:center}

.sub-sec table th{padding:4px 6px}

.sub-sec table td.col-act{width:80px}



td{padding:0;height:24px;font-family:'Inter',sans-serif;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

td:last-child{border-right:none}

td.col-rn{background:var(--xl-rn);color:var(--xl-rn-tx);text-align:center;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;border-right:2px solid var(--bd);padding:0 2px;user-select:none}

td.col-act{padding:0;white-space:nowrap;width:80px;text-align:center;vertical-align:middle}



tr:nth-child(even) td{background:var(--xl-row-alt)}

tr.row-activo td{background:rgba(74,222,128,.16)!important}

tr.row-sub td{background:var(--bg2)!important}

tr:hover td{background:var(--xl-hover)!important}

tr:hover td.col-rn{background:var(--bg4)!important}

tr:hover td.col-act{background:transparent!important}



td.xl-ro-pct{padding:0 6px;text-align:right;font-size:10px;color:var(--warn);font-weight:500}



.ni{background:transparent;border:none;color:var(--tx);font-family:'Inter',sans-serif;font-size:11px;padding:0 6px;width:100%;height:24px;outline:none;transition:background .1s}

.ni:focus{background:var(--xl-focus);box-shadow:inset 0 0 0 1.5px var(--ac)}

select.ni{background:var(--bg3);border:1px solid var(--tx2);border-radius:4px;cursor:pointer}

select.ni option{background:var(--bg3);color:var(--tx);padding:4px 8px}

.ni[type=number]{text-align:right;-moz-appearance:textfield}

.ni[type=number]::-webkit-inner-spin-button,.ni[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}



.sel{background:transparent;border:none;color:var(--tx);font-family:'Inter',sans-serif;font-size:11px;padding:0 4px;height:24px;outline:none;width:100%;cursor:pointer;-webkit-appearance:none}

.sel:focus{background:var(--xl-focus);box-shadow:inset 0 0 0 1.5px var(--ac)}

.sel option{background:var(--bg3);color:var(--tx)}

@keyframes fadeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}

.toast{position:fixed;top:16px;right:16px;z-index:9999;background:var(--bg3);border:1px solid var(--bdr);border-radius:6px;padding:10px 18px;font-size:12px;font-weight:600;color:var(--tx);box-shadow:0 4px 16px rgba(0,0,0,.4);animation:fadeIn .2s}

.toast.toast-err{border-color:var(--err);color:var(--err)}

.toast.toast-ok{border-color:var(--ok);color:var(--ok)}



.btn{background:var(--bg3);border:1px solid var(--bd2);border-radius:3px;color:var(--tx2);font-family:'JetBrains Mono',monospace;font-size:8px;padding:3px 8px;cursor:pointer;transition:all .12s;white-space:nowrap}

.btn:hover{border-color:var(--ac);color:var(--ac)}

.btn-ac{background:var(--ac);border-color:var(--ac);color:#fff}

.btn-ac:hover{background:var(--ac2)}

.btn-del{border:none;background:none;padding:2px;cursor:pointer;opacity:.7;transition:opacity .1s;line-height:1;display:inline-flex;align-items:center;justify-content:center}

.btn-del:hover{opacity:1;background:rgba(232,72,72,.1);border-radius:3px}

.btn-edit{border:none;background:none;padding:2px;cursor:pointer;opacity:.8;transition:opacity .1s;line-height:1;display:inline-flex;align-items:center;justify-content:center}

.btn-edit:hover{opacity:1;background:rgba(232,168,48,.1);border-radius:3px}



.f1{flex:1}



.mn8{font-size:8px}

.c-tx3{color:var(--tx3)}.c-warn{color:var(--warn)}.c-ok{color:var(--ok)}



.banner{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:6px 10px;margin-bottom:8px;font-size:9px;color:var(--tx2);line-height:1.4}



.sub-sec{margin:6px 0;border:1px solid var(--bdr);border-radius:0;border-right:none}

.sub-tbl-wrap{overflow:visible}

.sub-sec .sub-tbl-wrap table thead{position:static !important;z-index:auto !important}

.sub-sec table tr:last-child td{border-bottom:none}

.sub-sec .sub-tbl-wrap table td.col-act,.sub-sec .sub-tbl-wrap table th.col-act{border-right:1px solid var(--bdr)}



.empty-row td{color:var(--tx3);font-style:italic;font-size:9px;text-align:center;height:28px;background:var(--bg2)!important}



.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}

.modal-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:0;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}

.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bdr);background:var(--bg3)}

.modal-hdr .title{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:var(--ac)}

.modal-body{flex:1;overflow:auto;padding:10px 14px}

.modal-foot{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:10px 14px;border-top:1px solid var(--bdr);background:var(--bg3)}

const fmtDate=function(v){if(!v||v==='')return'\u2014';var s=String(v).trim();var d;

  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){d=new Date(s+'T00:00:00')}

  else if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var p=s.split('/');d=new Date(p[2],p[1]-1,p[0])}

  else if(/^\d{2}\/\d{2}\/\d{2}$/.test(s)){var p=s.split('/');d=new Date(2000+parseInt(p[2]),p[1]-1,p[0])}

  else if(/^\d{1,2}-[a-z]{3}-\d{2,4}$/i.test(s)){d=new Date(s)}

  else if(!isNaN(Number(v))&&Number(v)>1000000000000){d=new Date(Number(v))}

  else if(!isNaN(Number(s))&&Number(s)>40000&&Number(s)<60000){d=new Date((Number(s)-25569)*86400000)}

  else{d=new Date(s)}

  if(isNaN(d.getTime()))return s;

  var dd=String(d.getDate()).padStart(2,'0');var mm=MONTHS[d.getMonth()];var yy=String(d.getFullYear()).slice(2);

  return dd+'-'+mm+'-'+yy};

/* Normaliza cualquier formato de fecha que fmtDate reconoce (ISO, dd/mm/aaaa, dd-mmm-aa, serial Excel)
   de vuelta a ISO yyyy-mm-dd, para poder reimportar fechas exportadas sin romper el input type="date". */
const toISODate=function(v){if(!v||v===''||v==='—')return'';var s=String(v).trim();var d;
  if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
  if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var p=s.split('/');d=new Date(p[2],p[1]-1,p[0])}
  else if(/^\d{2}\/\d{2}\/\d{2}$/.test(s)){var p=s.split('/');d=new Date(2000+parseInt(p[2]),p[1]-1,p[0])}
  else if(/^\d{1,2}-[a-z]{3}-\d{2,4}$/i.test(s)){d=new Date(s)}
  else if(!isNaN(Number(v))&&Number(v)>1000000000000){d=new Date(Number(v))}
  else if(!isNaN(Number(s))&&Number(s)>40000&&Number(s)<60000){d=new Date((Number(s)-25569)*86400000)}
  else{d=new Date(s)}
  if(isNaN(d.getTime()))return s;
  var yy=d.getFullYear();var mm=String(d.getMonth()+1).padStart(2,'0');var dd=String(d.getDate()).padStart(2,'0');
  return yy+'-'+mm+'-'+dd};



function NumInput({value,onChange,decimals,format,placeholder,...rest}){

  var [raw,setRaw]=useState(null);

  var [focused,setFocused]=useState(false);

  var isEmpty=!focused&&raw===null&&(value===0||value===null||value===undefined||value==='');

  var displayVal=raw!==null?raw:(focused?String(value):(format?fmt(value,typeof decimals==='number'?decimals:2):(typeof decimals==='number'?Number(value).toFixed(decimals):numVal(value,true))));

  var handleChange=function(e){

    var nv=e.target.value;

    var parsed=safeFloat(nv);

    var isIncomplete=typeof nv==='string'&&(/[\.,-]$/.test(nv)||nv==='-'||nv==='+'||nv==='');

    setRaw(isIncomplete?nv:(typeof parsed==='string'?nv:null));

    if(!isIncomplete)onChange(parsed);

  };

  var handleBlur=function(){setRaw(null);setFocused(false)};

  var handleFocus=function(e){setFocused(true);e.target.select()};

  if(placeholder)return <div style={{position:'relative',display:'inline-block',width:'100%'}}><input className="ni" value={isEmpty?'':displayVal} onChange={handleChange} onBlur={handleBlur} onFocus={handleFocus} {...rest}/>{isEmpty&&<span style={{position:'absolute',left:0,right:0,top:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--warn)',pointerEvents:'none',fontWeight:700}}>{placeholder}</span>}</div>;

  return <input className="ni" value={displayVal} onChange={handleChange} onBlur={handleBlur} onFocus={handleFocus} {...rest}/>;

}

function getTipoProyecto(p,presupuestos){
  if(p.parent_id)return 'sub_proyecto';
  var tieneHijos=presupuestos.some(function(x){return x.parent_id===p.id});
  if(tieneHijos||p.con_sub_proyectos)return 'principal';
  return 'independiente';
}

function flattenPresupuestos(presupuestos){
  var result=[];
  var principales=presupuestos.filter(function(p){return !p.parent_id});
  principales.forEach(function(p){
    result.push({pres:p,level:0});
    var hijos=presupuestos.filter(function(x){return x.parent_id===p.id});
    hijos.forEach(function(h){result.push({pres:h,level:1})});
  });
  return result;
}

function detectarFilaCapitulo(fila,mapeo){
  var cantidad=safeFloat(fila[mapeo.col_cantidad]);
  var unidad=String(fila[mapeo.col_unidad]||'').trim();
  var desc=String(fila[mapeo.col_descripcion]||'').trim();
  var critCantidad=isNaN(cantidad)||cantidad===0;
  var critUnidad=unidad===''||unidad==='-';
  var critDesc=false;
  if(desc.length>0){
    var may=(desc.match(/[A-ZÁÉÍÓÚÑ]/g)||[]).length;
    var let_=(desc.match(/[a-zA-ZÁÉÍÓÚÑáéíóúñ]/g)||[]).length;
    var esMay=let_>0&&(may/let_)>0.8;
    var patron=/^(cap[ií]tulo|cap\.?|t[ií]tulo|item|[IVX]+\.?\s|\d+\.\s)/i.test(desc);
    critDesc=esMay||patron;
  }
  return((critCantidad?1:0)+(critUnidad?1:0)+(critDesc?1:0))>=2;
}

function esCapituloFinal(item){
  if(item.es_capitulo_manual!==null&&item.es_capitulo_manual!==undefined)return item.es_capitulo_manual;
  return item.es_capitulo;
}

/* Recalcula el campo item.capitulo (texto informativo, no editable) heredando la descripcion
   del capitulo mas cercano hacia arriba. Se ejecuta tras cualquier cambio estructural (agregar,
   eliminar, editar, marcar/desmarcar capitulo) para que nunca quede desincronizado. */
function recalcCapitulos(arr){
  var actual='';
  return arr.map(function(it){
    if(esCapituloFinal(it)){actual=it.descripcion||'';return Object.assign({},it,{capitulo:''})}
    return Object.assign({},it,{capitulo:actual});
  });
}

function autoDetectarFilaInicio(filas){
  for(var i=0;i<Math.min(15,filas.length-1);i++){
    var fila=filas[i];
    var siguiente=filas[i+1];
    var noVacias=fila.filter(function(c){return String(c||'').trim()!==''}).length;
    var sigNoVacias=siguiente.filter(function(c){return String(c||'').trim()!==''}).length;
    if(noVacias>=3&&sigNoVacias>=3)return i+1;
  }
  return 3;
}

/* Devuelve el colSpan para la celda (r,c) segun las celdas combinadas (!merges) de la hoja:
   >1 si es el ancla del merge, 0 si esta cubierta por uno (no se renderiza), 1 si no aplica. */
function getMergeSpan(r,c,merges){
  for(var i=0;i<(merges||[]).length;i++){
    var m=merges[i];
    if(m.s.r===r&&m.s.c===c)return(m.e.c-m.s.c+1);
    if(r>=m.s.r&&r<=m.e.r&&c>=m.s.c&&c<=m.e.c&&!(m.s.r===r&&m.s.c===c))return 0;
  }
  return 1;
}

function validarExportacionFormulario(pres){
  var itemsReales=(pres.items||[]).filter(function(it){return !esCapituloFinal(it)});
  var sinAPU=itemsReales.filter(function(it){return !it.tiene_apu||!it.apu_id});
  return{
    valido:sinAPU.length===0,
    pendientes:sinAPU.map(function(it){return(it.num_item||'')+' — '+(it.descripcion||'Sin descripcion')})
  };
}

function parseCantidad(raw){
  var s=String(raw||'').trim();
  if(!s||s==='-')return 0;
  var tienePunto=s.indexOf('.')>=0;
  var tieneComa=s.indexOf(',')>=0;
  if(tienePunto&&tieneComa){
    var ulPunto=s.lastIndexOf('.');
    var ulComa=s.lastIndexOf(',');
    if(ulComa>ulPunto){
      // Formato colombiano: 1.500,00 -> coma es decimal
      return safeFloat(s.replace(/\./g,'').replace(',','.'));
    }else{
      // Formato internacional: 1,500.00 -> punto es decimal
      return safeFloat(s.replace(/,/g,''));
    }
  }
  if(tieneComa&&!tienePunto){
    var partes=s.split(',');
    if(partes[partes.length-1].length<=2){
      // Coma como decimal: 1,5
      return safeFloat(s.replace(',','.'));
    }
    // Coma como separador de miles: 1,500
    return safeFloat(s.replace(/,/g,''));
  }
  return safeFloat(s);
}

/* ══════ Importador Multi-APU — parser puro (Fase 2, formato v2) ══════
   Espejo estructural de exportApuExcel (ver CIVILMANAGER_Spec_Tecnica_Import_MultiAPU_2.docx):
   Fila 1 del APU: Codigo | | | | | 'Fecha:' | valorFecha
   Fila 2 del APU: Nombre | | | | | 'Unidad:' | valorUnidad
   Fila en blanco, luego secciones ancla ▌ A. EQUIPO / ▌ B. MATERIALES / ▌ C. TRANSPORTE / ▌ D. PERSONAL,
   cada una con su propia fila de encabezados de columna y sus filas de recurso, separadas por filas
   de subtotal ("",...,"Subtotal X:",...) y filas en blanco. Tambien reconoce (y usa como contexto,
   sin bloquear) las cabeceras de categoria "▌ NOMBRE (N APU)" y la fila de titulo del export, para
   poder reimportar directamente un archivo generado por "Exportar Excel". */
function normalizarTexto(txt){return (txt||'').toString().toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').replace(/\s+/g,' ').trim()}

function esFilaVaciaApu(fila){if(!fila)return true;return fila.every(function(c){return c===undefined||c===null||String(c).trim()===''})}

/* Filas decorativas del export real que no son un recurso: subtotales por seccion ("Subtotal X:"
   en col3), lineas de F.P. de personal ("Personal sin F.P.:"/"Valor Prestacional" en col4/col5,
   sin nada en col0/col1 — a diferencia de un recurso real, que SIEMPRE trae Descripcion en col1
   aunque el Codigo sea opcional), y la fila de TOTAL COSTO DIRECTO al cierre de cada APU. */
function esFilaSubtotalApu(fila){
  if(!fila)return false;
  var c0=String(fila[0]||'').trim(),c1=String(fila[1]||'').trim();
  if(/^TOTAL COSTO DIRECTO/i.test(c0))return true;
  if(c0===''&&c1===''){
    var resto=fila.slice(2).some(function(v){return v!==undefined&&v!==null&&String(v).trim()!==''});
    return resto;
  }
  return false;
}

function esEncabezadoCategoriaApu(fila){var c0=(fila&&fila[0]||'').toString().trim();return/^▌\s.+\(\d+\s*APU\)$/i.test(c0)}

function esTituloExportApu(fila){var c0=(fila&&fila[0]||'').toString().trim().toUpperCase();return c0.indexOf('CIVILMANAGER')===0&&c0.indexOf('ANALISIS')>=0}

var SECCIONES_APU={'▌ A. EQUIPO':'recursos_eq','▌ B. MATERIALES':'recursos_ins','▌ C. TRANSPORTE':'recursos_transporte','▌ D. PERSONAL':'recursos_mo'};

/* Mapeo de columnas por seccion, identico al que ya usa exportApuExcel para cada una:
   EQUIPO:      Codigo|Descripcion|Tarifa por|Vr.Unitario|Rendimiento|-|Vr.Parcial
   MATERIALES:  Codigo|Descripcion|UN|Vr.Unitario|Consumo|Desperdicios|Vr.Parcial
   TRANSPORTE:  Codigo|Descripcion|Unidad|Distancia(km)|Tarifa|-|Vr.Parcial
   PERSONAL:    Codigo|Descripcion|Cant.Pers.|Vr.por(label)|Vr.(con F.P.)|Rendimiento|Vr.Parcial */
function parseFilaRecursoPorSeccion(seccion,fila,filaNum,errores){
  var codigo=(fila[0]||'').toString().trim();
  var nombre=(fila[1]||'').toString().trim();
  var r={seccion:seccion,codigo:codigo||null,nombre:nombre,fila:filaNum,desperdicios_pct:null};
  if(seccion==='recursos_eq'){
    r.tipo='EQUIPO';r.unidad=(fila[2]||'').toString().trim();r.precio=safeFloat(fila[3]);r.rendimiento=safeFloat(fila[4]);r.cantidad=0;
  }else if(seccion==='recursos_ins'){
    r.tipo='INSUMO';r.unidad=(fila[2]||'').toString().trim();r.precio=safeFloat(fila[3]);r.cantidad=safeFloat(fila[4]);r.rendimiento=0;
    var despRaw=fila[5];
    var despValido=despRaw!==undefined&&despRaw!==null&&String(despRaw).trim()!==''&&!isNaN(parseFloat(String(despRaw).replace(',','.')));
    if(!despValido){errores.push({fila:filaNum,msg:'Falta Desperdicios valido en MATERIALES (obligatorio en toda fila de esa seccion)'})}
    else{r.desperdicios_pct=safeFloat(despRaw)}
  }else if(seccion==='recursos_transporte'){
    r.tipo='TRANSPORTE';r.unidad=(fila[2]||'').toString().trim();r.cantidad=safeFloat(fila[3]);r.precio=safeFloat(fila[4]);r.rendimiento=0;
  }else if(seccion==='recursos_mo'){
    r.tipo='MO';r.unidad='';r.cantidad=safeFloat(fila[2])||1;r.precio=safeFloat(fila[4]);r.rendimiento=safeFloat(fila[5]);
  }
  return r;
}

function parseApuBlocks(aoa){
  var estado='esperando_apu',seccionActual=null,categoriaActual='';
  var bloques=[],actual=null,errores=[];
  for(var i=0;i<(aoa||[]).length;i++){
    var fila=aoa[i]||[];
    if(esTituloExportApu(fila))continue;
    if(esEncabezadoCategoriaApu(fila)){
      if(actual){bloques.push(actual);actual=null}
      estado='esperando_apu';seccionActual=null;
      categoriaActual=(fila[0]||'').toString().replace(/^▌\s*/,'').replace(/\s*\(\d+\s*APU\)\s*$/i,'').trim();
      continue;
    }
    if(esFilaSubtotalApu(fila))continue;
    if(estado==='leyendo_recursos'&&esFilaVaciaApu(fila)){estado='en_bloque';seccionActual=null;continue}
    if(esFilaVaciaApu(fila))continue; // blanco perdido entre bloques, ignorar
    var primera=(fila[0]||'').toString().trim();
    if(estado==='esperando_apu'){
      actual={codigo:primera,nombre:'',unidad:'',categoria:categoriaActual,fecha:fila[6]||null,filaInicio:i+1,recursos_ins:[],recursos_mo:[],recursos_eq:[],recursos_transporte:[]};
      estado='leyendo_nombre';
      continue;
    }
    if(estado==='leyendo_nombre'){
      actual.nombre=primera;actual.unidad=(fila[6]||'').toString().trim();
      estado='en_bloque';seccionActual=null;
      continue;
    }
    if(estado==='en_bloque'){
      if(SECCIONES_APU[primera]){seccionActual=SECCIONES_APU[primera];estado='header_seccion';continue}
      // fila no reconocida como seccion => empieza un nuevo APU
      bloques.push(actual);
      actual={codigo:primera,nombre:'',unidad:'',categoria:categoriaActual,fecha:fila[6]||null,filaInicio:i+1,recursos_ins:[],recursos_mo:[],recursos_eq:[],recursos_transporte:[]};
      estado='leyendo_nombre';
      continue;
    }
    if(estado==='header_seccion'){estado='leyendo_recursos';continue} // fila de encabezados de columna, se descarta
    if(estado==='leyendo_recursos'&&seccionActual){
      actual[seccionActual].push(parseFilaRecursoPorSeccion(seccionActual,fila,i+1,errores));
      continue;
    }
  }
  if(actual)bloques.push(actual);
  return{bloques:bloques,errores:errores};
}

/* Si la fila trae Codigo explicito, ese codigo es la identidad del recurso (se agrupan todas las
   apariciones con ese mismo codigo aunque el nombre/unidad tipeado varie) y se salta el motor de
   matching por nombre/unidad/precio — se resuelve por codigo directo (ver buscarMatchPorCodigo). */
function consolidarRecursosApu(bloques){
  var mapa=new Map();
  (bloques||[]).forEach(function(b){
    ['recursos_ins','recursos_mo','recursos_eq','recursos_transporte'].forEach(function(sec){
      (b[sec]||[]).forEach(function(r){
        var key=claveDeRecursoCrudo(r);
        if(!mapa.has(key)){
          mapa.set(key,{tipo:r.tipo,codigo:r.codigo||null,nombre_normalizado:normalizarTexto(r.nombre),nombre_variantes:[],unidad:r.unidad,precio_excel:r.precio,precio_excel_variantes:[],apariciones:[],match:null,severidad:null,decision:null,edicion:{},desperdicio_valido:true});
        }
        var e=mapa.get(key);
        if(e.nombre_variantes.indexOf(r.nombre)===-1)e.nombre_variantes.push(r.nombre);
        if(e.precio_excel_variantes.indexOf(r.precio)===-1)e.precio_excel_variantes.push(r.precio);
        if(r.tipo==='INSUMO'&&r.desperdicios_pct===null)e.desperdicio_valido=false;
        e.apariciones.push({apu_codigo:b.codigo,ref:r});
      });
    });
  });
  return Array.from(mapa.values());
}

/* ══════ Importador Multi-APU — matching, severidad y repositorio (Fase 3) ══════ */
function similitud(a,b){
  a=normalizarTexto(a);b=normalizarTexto(b);
  if(a===b)return 100;
  var la=a.length,lb=b.length;
  if(la===0||lb===0)return 0;
  var dp=[];
  for(var i=0;i<=la;i++){dp.push([i])}
  for(var j=0;j<=lb;j++){dp[0][j]=j}
  for(i=1;i<=la;i++){
    for(j=1;j<=lb;j++){
      var costo=a[i-1]===b[j-1]?0:1;
      dp[i][j]=Math.min(dp[i-1][j]+1,dp[i][j-1]+1,dp[i-1][j-1]+costo);
    }
  }
  var dist=dp[la][lb],maxLen=Math.max(la,lb);
  return r2(Math.max(0,(1-dist/maxLen)*100));
}

/* tipo de recurso importado -> categoria del repositorio contra la que se matchea.
   TRANSPORTE matchea contra equipos porque recursos_transporte referencia un equipo_id (el vehiculo). */
var TIPO_RECURSO_A_CATEGORIA={INSUMO:'insumos',EQUIPO:'equipos',TRANSPORTE:'equipos',MO:'colaboradores'};

/* ══════ Estilos compartidos de export/plantilla APU (exportApuExcel + descargarPlantillaApu) ══════
   Extraidos de exportApuExcel para no duplicar la paleta de colores en dos lugares
   (ver CIVILMANAGER_Ajuste_Plantilla_Import_Visual.docx). */
function estilosApuExcel(){
  var FN='Calibri';
  function bd(hex){return{top:{style:'thin',color:{rgb:'FF'+hex}},bottom:{style:'thin',color:{rgb:'FF'+hex}},left:{style:'thin',color:{rgb:'FF'+hex}},right:{style:'thin',color:{rgb:'FF'+hex}}}}
  var BL=bd('888888');
  var BH=bd('444444');
  function bs(extra){var base={font:{name:FN,sz:9},border:BL};return extra?Object.assign(base,extra):base}
  return{
    FN:FN,BL:BL,BH:BH,bs:bs,
    S_TITLE:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1A2332'}},alignment:{horizontal:'center'},border:BH}),
    S_CAT:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'BFBFBF'}},border:BH}),
    S_SEC:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'BFBFBF'}},border:BH}),
    S_HDR:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'333333'}},fill:{fgColor:{rgb:'D9D9D9'}},alignment:{horizontal:'center'},border:BH}),
    S_CELL:bs(),
    S_CELL_R:bs({alignment:{horizontal:'right'},numFmt:XLS_NUM_FMT}),
    S_CELL_RT:bs({alignment:{horizontal:'right'}}),
    S_CELL_C:bs({alignment:{horizontal:'center'}}),
    S_CELL_C2:bs({alignment:{horizontal:'center'},numFmt:XLS_NUM_FMT}),
    S_CELL_4:bs({alignment:{horizontal:'center'},numFmt:'#,##0.0000'}),
    S_HERR:bs({font:{name:FN,sz:9,italic:true,color:{rgb:'9CA3AF'}},numFmt:XLS_NUM_FMT}),
    S_HERR_C:bs({font:{name:FN,sz:9,italic:true,color:{rgb:'9CA3AF'}},alignment:{horizontal:'center'}}),
    S_HERR_P:bs({font:{name:FN,sz:9,italic:true,color:{rgb:'9CA3AF'}},alignment:{horizontal:'center'},numFmt:'0.00%'}),
    S_SUB_LBL:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'333333'}},alignment:{horizontal:'right'},fill:{fgColor:{rgb:'F2F2F2'}},border:BH}),
    S_SUB_VAL:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'333333'}},alignment:{horizontal:'right'},fill:{fgColor:{rgb:'F2F2F2'}},numFmt:XLS_NUM_FMT,border:BH}),
    S_TOTAL_LBL:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'333333'}},alignment:{horizontal:'right'},fill:{fgColor:{rgb:'C4BD97'}},border:BH}),
    S_TOTAL_VAL:bs({font:{name:FN,sz:9,bold:true,color:{rgb:'333333'}},alignment:{horizontal:'right'},fill:{fgColor:{rgb:'C4BD97'}},numFmt:'#,##0',border:BH}),
    S_DATE:bs({numFmt:'dd-mmm-yy',alignment:{horizontal:'left'}})
  };
}

/* Recorre las filas ya construidas (aoa) y les asigna estilo segun el CONTENIDO de la fila —
   mismos marcadores que ya usa exportApuExcel (▌ seccion, 'Codigo', 'TOTAL COSTO DIRECTO',
   'Subtotal...', EQ-000, prefijos EQ-/IN-/MO-). No depende de datos reales de un APU: por eso
   sirve igual para el export con datos que para la plantilla en blanco. */
/* aoa_to_sheet no convierte strings "=..." en formulas reales — quedan como texto literal.
   Recorre el rango de la hoja y convierte cualquier celda de texto que empiece en '=' a celda
   de formula real (mismo paso que ya usaba exportApuExcel, factorizado para reusar tambien en
   descargarPlantillaApu). */
function convertirFormulasApuExcel(ws){
  if(!ws['!ref'])return;
  var rng=XLSX.utils.decode_range(ws['!ref']);
  for(var R=rng.s.r;R<=rng.e.r;++R){
    for(var C=rng.s.c;C<=rng.e.c;++C){
      var addr=XLSX.utils.encode_cell({r:R,c:C});
      var cell=ws[addr];
      if(cell&&cell.t==='s'&&typeof cell.v==='string'&&cell.v.charAt(0)==='='){
        cell.f=cell.v.substring(1);cell.t='f';
      }
    }
  }
}

function aplicarEstilosApuExcel(ws,rows,ce,S){
  rows.forEach(function(row,rIdx){
    var c0=String(row[0]||'');
    if(rIdx===0){row.forEach(function(_,ci){var k=ce(rIdx,ci);if(ws[k])ws[k].s=S.S_TITLE})}
    else if(c0.indexOf('▌ ')===0&&c0.indexOf('APU')<0){row.forEach(function(_,ci){var k=ce(rIdx,ci);if(ws[k])ws[k].s=S.S_CAT})}
    else if(c0.indexOf('▌ ')===0){row.forEach(function(_,ci){var k=ce(rIdx,ci);if(ws[k])ws[k].s=S.S_SEC})}
    else if(c0==='Codigo'){row.forEach(function(_,ci){var k=ce(rIdx,ci);if(ws[k])ws[k].s=S.S_HDR})}
    else if(String(row[5]||'')==='Fecha:'){
      row.forEach(function(_,ci){var k=ce(rIdx,ci);if(!ws[k])return;
        ws[k].s=(ci===5)?S.S_CELL_RT:(ci===6)?S.S_DATE:(ci===0)?S.S_CELL_C:S.S_CELL;
      });
    }
    else if(String(row[5]||'')==='Unidad:'){
      row.forEach(function(_,ci){var k=ce(rIdx,ci);if(!ws[k])return;
        ws[k].s=(ci===5)?S.S_CELL_RT:(ci===6)?S.S_CELL:(ci===0)?S.S_CELL:S.S_CELL;
      });
    }
    else if(c0==='EQ-000'){row.forEach(function(_,ci){var k=ce(rIdx,ci);if(!ws[k])return;ws[k].s=(ci===4)?S.S_HERR_P:(ci===3||ci===6)?S.S_HERR:(ci===0||ci===2)?S.S_HERR_C:S.S_CELL})}
    else if(c0.indexOf('TOTAL COSTO DIRECTO')>=0){row.forEach(function(_,ci){var k=ce(rIdx,ci);if(ws[k])ws[k].s=ci===6?S.S_TOTAL_VAL:S.S_TOTAL_LBL})}
    else if(c0.indexOf('Subtotal')>=0||String(row[3]||'').indexOf('Subtotal')>=0){
      row.forEach(function(_,ci){var k=ce(rIdx,ci);if(ws[k])ws[k].s=ci===6?S.S_SUB_VAL:S.S_SUB_LBL});
    }
    else if(String(row[5]||'').indexOf('Personal sin F.P.')>=0||String(row[4]||'').indexOf('Valor Prestacional')>=0){
      row.forEach(function(_,ci){var k=ce(rIdx,ci);if(!ws[k])return;
        if(ci===5&&String(row[4]||'').indexOf('Valor Prestacional')>=0)ws[k].s=S.S_CELL_R;
        else if(ci===6)ws[k].s=S.S_CELL_R;
        else ws[k].s=S.S_CELL;
      });
    }
    else if(c0.match(/^(EQ|IN|MO)-/)){
      row.forEach(function(_,ci){var k=ce(rIdx,ci);if(!ws[k])return;
        if(ci===6)ws[k].s=S.S_CELL_R;
        else if(ci===2&&c0.indexOf('MO-')===0)ws[k].s=S.S_CELL_C2;
        else if(ci===2)ws[k].s=S.S_CELL_C;
        else if(ci===3&&c0.indexOf('MO-')===0)ws[k].s=S.S_CELL_C;
        else if(ci===3)ws[k].s=S.S_CELL_R;
        else if(ci===4&&(c0.indexOf('EQ-')===0||c0.indexOf('IN-')===0))ws[k].s=S.S_CELL_4;
        else if(ci===4)ws[k].s=S.S_CELL_R;
        else if(ci===5&&(c0.indexOf('MO-')===0))ws[k].s=S.S_CELL_4;
        else if(ci===0)ws[k].s=S.S_CELL_C;
        else ws[k].s=S.S_CELL;
      });
    }
    else{row.forEach(function(_,ci){var k=ce(rIdx,ci);if(ws[k])ws[k].s=S.S_CELL})}
  });
}

function nombreCatalogo(registro){return registro.nombre||registro.descripcion||''}
function precioCatalogo(registro){
  if(registro.costo_unitario!=null)return safeFloat(registro.costo_unitario);
  if(registro.costo_hora!=null)return safeFloat(registro.costo_hora);
  if(registro.costo_total_dia!=null)return safeFloat(registro.costo_total_dia);
  if(registro.costo_base_dia!=null)return safeFloat(registro.costo_base_dia);
  return 0;
}

function buscarMatch(recurso,base){
  var categoria=TIPO_RECURSO_A_CATEGORIA[recurso.tipo];
  var candidatos=(base&&base[categoria])||[];
  var mejor=null,mejorSim=-1;
  candidatos.forEach(function(c){
    var sim=similitud(recurso.nombre_normalizado,normalizarTexto(nombreCatalogo(c)));
    if(sim>mejorSim){mejorSim=sim;mejor=c}
  });
  if(!mejor||mejorSim<50)return null; // umbral minimo de candidatura (no confundir con umbralPct de precio)
  return{id:mejor.id,nombre:nombreCatalogo(mejor),unidad:mejor.unidad||recurso.unidad,precio:precioCatalogo(mejor)};
}

/* Match directo por Codigo (columna opcional de la plantilla v2): si el usuario llena el codigo de
   catalogo en la fila, se resuelve por ese codigo exacto y NO se pasa por el motor de similitud. */
function buscarMatchPorCodigo(recurso,base){
  if(!recurso.codigo)return null;
  var categoria=TIPO_RECURSO_A_CATEGORIA[recurso.tipo];
  var candidatos=(base&&base[categoria])||[];
  var cod=recurso.codigo.toUpperCase();
  var encontrado=candidatos.find(function(c){return(c.codigo||'').toUpperCase()===cod});
  if(!encontrado)return null;
  return{id:encontrado.id,nombre:nombreCatalogo(encontrado),unidad:encontrado.unidad||recurso.unidad,precio:precioCatalogo(encontrado)};
}

function calcularSeveridad(recurso,umbralPct){
  umbralPct=umbralPct==null?15:umbralPct;
  if(recurso.tipo==='INSUMO'&&!recurso.desperdicio_valido)return'bloqueante';
  if(!recurso.match)return'sin_match';
  var simNombre=similitud(recurso.nombre_normalizado,normalizarTexto(recurso.match.nombre));
  var unidadIgual=normalizarTexto(recurso.unidad)===normalizarTexto(recurso.match.unidad);
  var deltaPct=Math.abs(recurso.precio_excel-recurso.match.precio)/(recurso.match.precio||1)*100;
  if(!unidadIgual)return'critica';
  if(simNombre>=99.5&&deltaPct>umbralPct)return'alta';
  if(simNombre>=80&&simNombre<99.5)return'media';
  if(simNombre>=99.5&&deltaPct<=umbralPct)return'baja';
  return'sin_match';
}

/* Resuelve match+severidad+decision de un recurso unico: si trae Codigo, resuelve por codigo directo
   (severidad 'baja' automatica, sin pasar por similitud/umbral de precio); si no, usa el motor de
   matching por nombre/unidad/precio existente. Usado en cada (re)calculo de recursosUnicos. */
function resolverMatchYSeveridad(ru,base,umbralPct){
  var n=Object.assign({},ru);
  if(n.tipo==='INSUMO'&&!n.desperdicio_valido){n.match=n.codigo?buscarMatchPorCodigo(n,base):buscarMatch(n,base);n.severidad='bloqueante';return n}
  if(n.codigo){
    n.match=buscarMatchPorCodigo(n,base);
    n.severidad=n.match?'baja':'sin_match';
    if(n.match&&!n.decision)n.decision='vincular';
  }else{
    n.match=buscarMatch(n,base);
    n.severidad=calcularSeveridad(n,umbralPct);
    if(n.severidad==='baja'&&!n.decision)n.decision='vincular';
  }
  return n;
}

/* contexto = { modo:'catalogo_global'|'snapshot_proyecto', data, presupuesto, setData, setPresupuesto }
   modo se determina por donde se invoca el modal (Catalogo/APU general vs. dentro de un proyecto), no por un flag en los datos. */
function crearRepositorio(contexto){
  var esSnapshot=contexto.modo==='snapshot_proyecto';
  var campoSnap={insumos:'insumos_snap',equipos:'equipos_snap',colaboradores:'cargos_snap'};
  var campoGlobal={insumos:'insumos',equipos:'equipos',colaboradores:'cargos'};
  return{
    leer:function(tipo){
      return esSnapshot?(contexto.presupuesto[campoSnap[tipo]]||[]):(contexto.data[campoGlobal[tipo]]||[]);
    },
    crear:function(tipo,registro){
      if(esSnapshot){
        var campo=campoSnap[tipo];
        var arr=(contexto.presupuesto[campo]||[]).concat([registro]);
        contexto.setPresupuesto(Object.assign({},contexto.presupuesto,{[campo]:arr}));
      }else{
        var campoG=campoGlobal[tipo];
        var arrG=(contexto.data[campoG]||[]).concat([registro]);
        contexto.setData(Object.assign({},contexto.data,{[campoG]:arrG}));
      }
      return registro;
    },
    actualizarPrecio:function(tipo,id,nuevoPrecio){
      var campoPrecio={insumos:'costo_unitario',equipos:'costo_hora',colaboradores:'costo_total_hora'}[tipo];
      var upd=function(arr){return arr.map(function(x){return x.id===id?Object.assign({},x,{[campoPrecio]:nuevoPrecio}):x})};
      if(esSnapshot){
        var campo=campoSnap[tipo];
        contexto.setPresupuesto(Object.assign({},contexto.presupuesto,{[campo]:upd(contexto.presupuesto[campo]||[])}));
      }else{
        var campoG=campoGlobal[tipo];
        contexto.setData(Object.assign({},contexto.data,{[campoG]:upd(contexto.data[campoG]||[])}));
      }
    }
  };
}

/* Misma logica de agrupacion que consolidarRecursosApu: por codigo si esta presente, si no por
   tipo+nombre+unidad normalizados. Debe coincidir siempre con la clave usada alla para que
   idPorKey (aplicarImportacion) y idDe (buildApuFromBlock) resuelvan al mismo recurso. */
function claveDeRU(ru){return ru.codigo?('COD|'+ru.tipo+'|'+ru.codigo.toUpperCase()):(ru.tipo+'|'+ru.nombre_normalizado+'|'+normalizarTexto(ru.unidad))}
function claveDeRecursoCrudo(r){return r.codigo?('COD|'+r.tipo+'|'+r.codigo.toUpperCase()):(r.tipo+'|'+normalizarTexto(r.nombre)+'|'+normalizarTexto(r.unidad))}

/* Construye un cargo (colaborador) nuevo a partir de un costo importado (asumido CON F.P. incluido).
   El modelo real de CIVILMANAGER solo permite fijar el costo de un cargo via num_salarios_base
   (multiplo del salario base global) — costo_total_dia/hora se recalculan siempre en cargosCalc
   y no pueden fijarse directamente. Por eso aqui se aproxima num_salarios_base deshaciendo el F.P.
   y dividiendo por el salario base: es una aproximacion con perdida de precision, no un valor exacto. */
function buildCargoDesdeImport(nombreExcel,costoImportado,esHa,factorPrestGlobal,config,existingCargos){
  var sb=config.salario_base||1750905;
  var dias=config.dias_mes||30;
  var factor=1+(safeFloat(factorPrestGlobal)/100);
  var costo=safeFloat(costoImportado)||0;
  var total=esHa?costo:costo*dias; // equivalente mensual (valorBasico+prestaciones)
  var valorBasico=factor?total/factor:total;
  var numSalariosBase=r2(valorBasico/sb)||1;
  return{id:uid(),codigo:genCodeFor(existingCargos||[],'MO'),descripcion:nombreExcel,num_salarios_base:numSalariosBase};
}

function buildApuFromBlock(b,idPorKey){
  function idDe(r){return idPorKey.get(claveDeRecursoCrudo(r))}
  return{
    id:uid(),codigo:b.codigo||('APU-IMP-'+uid().slice(0,6)),nombre:b.nombre,categoria:b.categoria,unidad:b.unidad||'un',
    fecha_creacion:new Date().toISOString(),
    recursos_ins:(b.recursos_ins||[]).map(function(r){return{id:uid(),insumo_id:idDe(r),consumo:r.cantidad||0,desperdicios_pct:r.desperdicios_pct!=null?r.desperdicios_pct:5}}),
    recursos_mo:(b.recursos_mo||[]).map(function(r){return{id:uid(),cargo_id:idDe(r),cant_personas:r.cantidad||1,rendimiento:r.rendimiento||0}}),
    recursos_eq:(b.recursos_eq||[]).map(function(r){return{id:uid(),equipo_id:idDe(r),rendimiento:r.rendimiento||0}}),
    recursos_transporte:(b.recursos_transporte||[]).map(function(r){return{id:uid(),equipo_id:idDe(r),unidad:r.unidad||'Definir',distancia_km:r.cantidad||0,tarifa:r.precio||0}})
  };
}

/* Propaga las decisiones tomadas en Fase 3 (crear/vincular/actualizar) al repositorio,
   y arma los objetos APU finales listos para agregar a data.apus (o presupuesto.apus_snap). */
/* Funcion pura: NO llama repositorio.crear/actualizarPrecio (que disparan su propio onChange
   cada uno). Si se hicieran varias llamadas a onChange seguidas de forma sincrona dentro del
   forEach, cada una parte del mismo `data`/`presupuesto` desactualizado capturado al crear el
   repositorio, y las llamadas posteriores pisan lo que hicieron las anteriores (ultima gana).
   Por eso se acumulan los arreglos localmente y se devuelven para que el llamador aplique
   TODO en un unico onChange/setPresupuesto. */
function aplicarImportacion(bloques,recursosUnicos,repositorio,contextoCalc){
  var insumosLocal=repositorio.leer('insumos').slice();
  var equiposLocal=repositorio.leer('equipos').slice();
  var colaboradoresLocal=repositorio.leer('colaboradores').slice();
  var idPorKey=new Map();
  recursosUnicos.forEach(function(ru){
    var decision=ru.decision||(ru.severidad==='baja'?'vincular':'crear_nuevo');
    var precioFinal=ru.edicion&&ru.edicion.precio!=null?safeFloat(ru.edicion.precio):ru.precio_excel;
    if(precioFinal===''||precioFinal==null||isNaN(precioFinal))precioFinal=ru.match?ru.match.precio:0; // Vr.Unitario opcional cuando el Codigo matchea
    var nombreFinal=(ru.edicion&&ru.edicion.nombre)||ru.nombre_variantes[0]||ru.nombre_normalizado;
    var unidadFinal=(ru.edicion&&ru.edicion.unidad)||ru.unidad;
    var id=null;
    if(decision==='crear_nuevo'){
      if(ru.tipo==='MO'){
        var cargo=buildCargoDesdeImport(nombreFinal,precioFinal,contextoCalc.esHora,contextoCalc.factorPrest,contextoCalc.config,colaboradoresLocal);
        colaboradoresLocal=colaboradoresLocal.concat([cargo]);
        id=cargo.id;
      }else if(ru.tipo==='INSUMO'){
        var insumo={id:uid(),codigo:genCodeFor(insumosLocal,'IN'),nombre:nombreFinal,unidad:unidadFinal,origen:'Local',categoria:'Pétreos',subcategoria:'otros',marca_referencia:'',costo_unitario:precioFinal,fecha_cotizacion:'',apu_basico_id:'',proveedor_id:''};
        insumosLocal=insumosLocal.concat([insumo]);
        id=insumo.id;
      }else{ // EQUIPO o TRANSPORTE -> catalogo de equipos
        var equipo={id:uid(),codigo:genCodeFor(equiposLocal,'EQ'),nombre:nombreFinal,tipo:'Equipo menor',unidad:unidadFinal,costo_hora:precioFinal,fecha_cotizacion:'',proveedor_id:''};
        equiposLocal=equiposLocal.concat([equipo]);
        id=equipo.id;
      }
    }else if(decision==='vincular_actualizar'&&ru.match){
      if(ru.tipo==='INSUMO'){
        insumosLocal=insumosLocal.map(function(x){return x.id===ru.match.id?Object.assign({},x,{costo_unitario:precioFinal}):x});
      }else if(ru.tipo==='EQUIPO'||ru.tipo==='TRANSPORTE'){
        equiposLocal=equiposLocal.map(function(x){return x.id===ru.match.id?Object.assign({},x,{costo_hora:precioFinal}):x});
      }else if(ru.tipo==='MO'){
        colaboradoresLocal=colaboradoresLocal.map(function(x){return x.id===ru.match.id?Object.assign({},x,{num_salarios_base:r2(precioFinal/(contextoCalc.config.salario_base||1750905))}):x});
      }
      id=ru.match.id;
    }else{
      id=ru.match?ru.match.id:null;
    }
    idPorKey.set(claveDeRU(ru),id);
  });
  var nuevosApus=bloques.map(function(b){return buildApuFromBlock(b,idPorKey)});
  return{nuevosApus:nuevosApus,insumos:insumosLocal,equipos:equiposLocal,colaboradores:colaboradoresLocal};
}

/* Presupuestos cuyo insumos_snap/equipos_snap/cargos_snap incluyen (via algun APU de su apus_snap)
   una referencia al recurso dado — sirve para avisar el impacto de decision==='vincular_actualizar'.
   Solo tiene sentido en modo catalogo_global: dentro de snapshot_proyecto el unico afectado posible
   es el propio proyecto. */
function presupuestosAfectados(recursoId,tipoRecurso,data){
  var campoRes={INSUMO:'recursos_ins',EQUIPO:'recursos_eq',TRANSPORTE:'recursos_eq',MO:'recursos_mo'}[tipoRecurso];
  var campoId={INSUMO:'insumo_id',EQUIPO:'equipo_id',TRANSPORTE:'equipo_id',MO:'cargo_id'}[tipoRecurso];
  return(data.presupuestos||[]).filter(function(p){
    return(p.apus_snap||[]).some(function(a){return(a[campoRes]||[]).some(function(r){return r[campoId]===recursoId})});
  });
}

function cargoJornal(cargo,usarFP,esHa){if(!cargo)return 0;if(esHa){return usarFP?(cargo.costo_base_hora||0):(cargo.costo_total_hora||0)}return usarFP?(cargo.costo_base_dia||cargo.costo_total_dia||0):(cargo.costo_total_dia||0)}

function calcAPU(a,cargosCalc,equipos,insumos,allCalc,herrPct,factorPrest,usarFP,esHa,cargoMapIn,eqMapIn,insMapIn){

  var cargoMap=cargoMapIn||new Map(cargosCalc.map(function(c){return [c.id,c]}));

  var eqMap=eqMapIn||new Map(equipos.map(function(e){return [e.id,e]}));

  var insMap=insMapIn||new Map(insumos.map(function(x){return [x.id,x]}));

  var abMap=Array.isArray(allCalc)?new Map(allCalc.map(function(b){return [b.id,b]})):null;

  var subMO=r2((a.recursos_mo||[]).reduce(function(s,r){

    var cargo=cargoMap.get(r.cargo_id);

    if(!cargo)return s;

    var costoUnitario=cargoJornal(cargo,usarFP,esHa);

    return s+costoUnitario*safeFloat(r.cant_personas)*safeFloat(r.rendimiento);

  },0));

  var herr=r2(subMO*(herrPct/100));

  var subEq=r2((a.recursos_eq||[]).reduce(function(s,r){

    var eq=eqMap.get(r.equipo_id);

    return s+(eq?safeFloat(eq.costo_hora)*safeFloat(r.rendimiento):0);

  },0));

  var subIns=r2((a.recursos_ins||[]).reduce(function(s,r){

    var ins=insMap.get(r.insumo_id);

    var costoU=0;

    if(ins){

      if(ins.origen==='Preparado en obra'){

        var ref=abMap?abMap.get(ins.apu_basico_id):null;

        costoU=ref?ref.costo_unitario:0;

      }else{costoU=ins.costo_unitario;}

    }

    var consumo=safeFloat(r.consumo)||1;

    var desp=(safeFloat(r.desperdicios_pct)||5)/100;

    return s+costoU*consumo*(1+desp);

  },0));

  var subTrans=r2((a.recursos_transporte||[]).reduce(function(s,r){

    return s+(r.unidad==='Global'?safeFloat(r.tarifa):safeFloat(r.tarifa)*safeFloat(r.distancia_km));

  },0));

  var vrPrest=usarFP?r2(subMO*(safeFloat(factorPrest)/100)):0;

  var subPers=r2(subMO+vrPrest);

  var totalDirecto=r2(subEq+subIns+subTrans+subPers);

  return{id:a.id,subMO,herr,subEq,subIns,subTrans,vrPrest,subPers,totalDirecto,costo_unitario:totalDirecto};

}





/* ══════ Importador Multi-APU — orquestacion (Fase 5) ══════ */
var SEVERIDAD_ORDEN={bloqueante:0,critica:1,alta:2,media:3,baja:4,sin_match:5};
var SEVERIDAD_LABEL={bloqueante:'Bloqueante',critica:'Critica',alta:'Alta',media:'Media',baja:'Baja (auto)',sin_match:'Sin match'};
var SEVERIDAD_COLOR={bloqueante:'#f87171',critica:'#f87171',alta:'#fbbf24',media:'#fbbf24',baja:'#4ade80',sin_match:'var(--tx3)'};

function useApuBlockImport(repositorio,contextoCalc){
  var faseSt=useState(1);var fase=faseSt[0],setFase=faseSt[1];
  var umbralSt=useState(15);var umbralPct=umbralSt[0],setUmbralPct=umbralSt[1];
  var nombreArchivoSt=useState('');var nombreArchivo=nombreArchivoSt[0],setNombreArchivo=nombreArchivoSt[1];
  var bloquesSt=useState([]);var bloques=bloquesSt[0],setBloques=bloquesSt[1];
  var erroresSt=useState([]);var erroresParse=erroresSt[0],setErroresParse=erroresSt[1];
  var recursosSt=useState([]);var recursosUnicos=recursosSt[0],setRecursosUnicos=recursosSt[1];
  var procesandoSt=useState(false);var procesando=procesandoSt[0],setProcesando=procesandoSt[1];

  var baseMatch=function(){return{insumos:repositorio.leer('insumos'),equipos:repositorio.leer('equipos'),colaboradores:repositorio.leer('colaboradores')}};

  var procesarArchivo=function(file){
    setProcesando(true);
    var reader=new FileReader();
    reader.onload=function(e){
      try{
        var wb=XLSX.read(e.target.result,{type:'array'});
        var ws=wb.Sheets[wb.SheetNames[0]];
        var aoa=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
        var parsed=parseApuBlocks(aoa);
        var base=baseMatch();
        var consolidados=consolidarRecursosApu(parsed.bloques).map(function(ru){return resolverMatchYSeveridad(ru,base,umbralPct)});
        setBloques(parsed.bloques);setErroresParse(parsed.errores);setRecursosUnicos(consolidados);
        setNombreArchivo(file.name);setProcesando(false);setFase(3);
      }catch(err){setProcesando(false);showToast('Error leyendo el archivo: '+err.message,{type:'err'})}
    };
    reader.onerror=function(){setProcesando(false);showToast('Error leyendo el archivo',{type:'err'})};
    reader.readAsArrayBuffer(file);
  };

  var cambiarUmbral=function(v){
    setUmbralPct(v);
    var base=baseMatch();
    setRecursosUnicos(function(list){return list.map(function(ru){return resolverMatchYSeveridad(ru,base,v)})});
  };

  var editarRecurso=function(key,campo,valor){
    var base=baseMatch();
    setRecursosUnicos(function(list){
      return list.map(function(ru){
        if(claveDeRU(ru)!==key)return ru;
        var n=Object.assign({},ru,{edicion:Object.assign({},ru.edicion,{[campo]:valor})});
        if(campo==='codigo'){n.codigo=(valor||'').trim()||null}
        if(campo==='nombre'){n.nombre_normalizado=normalizarTexto(valor)}
        if(campo==='desperdicios_pct'&&n.tipo==='INSUMO'){n.desperdicio_valido=valor!==''&&valor!=null&&!isNaN(parseFloat(String(valor).replace(',','.')))}
        return resolverMatchYSeveridad(n,base,umbralPct);
      });
    });
  };

  var setDecision=function(key,decision){
    setRecursosUnicos(function(list){return list.map(function(ru){return claveDeRU(ru)===key?Object.assign({},ru,{decision:decision}):ru})});
  };

  var hayBloqueos=recursosUnicos.some(function(ru){return ru.severidad==='bloqueante'||(ru.severidad==='critica'&&!ru.decision)});

  var confirmar=function(){
    return aplicarImportacion(bloques,recursosUnicos,repositorio,contextoCalc);
  };

  return{fase:fase,setFase:setFase,umbralPct:umbralPct,cambiarUmbral:cambiarUmbral,nombreArchivo:nombreArchivo,
    bloques:bloques,erroresParse:erroresParse,recursosUnicos:recursosUnicos,procesando:procesando,
    procesarArchivo:procesarArchivo,editarRecurso:editarRecurso,setDecision:setDecision,hayBloqueos:hayBloqueos,confirmar:confirmar};
}

function ImportApuModal({repositorio,contextoCalc,onAplicar,onClose}){
  var st=useApuBlockImport(repositorio,contextoCalc);
  var recursosOrdenados=st.recursosUnicos.slice().sort(function(a,b){return SEVERIDAD_ORDEN[a.severidad]-SEVERIDAD_ORDEN[b.severidad]});
  var numAuto=st.recursosUnicos.filter(function(ru){return ru.severidad==='baja'}).length;
  var numPendientes=st.recursosUnicos.length-numAuto;

  var handleConfirmar=function(){
    var resultado=st.confirmar();
    onAplicar(resultado);
    showToast(resultado.nuevosApus.length+' APU importados correctamente',{type:'ok'});
    onClose();
  };

  return(
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-box" style={{width:960,maxHeight:'88vh',display:'flex',flexDirection:'column'}} onClick={function(e){e.stopPropagation()}}>

    var eI=0,eE=0,eA=0;

    if(key==='categorias_insumo'||key==='unidades'||key==='origenes'){

      for(var i=0;i<ins.length;i++){

        if(key==='categorias_insumo'&&ins[i].categoria===val)eI++;

        if(key==='unidades'&&ins[i].unidad===val)eI++;

        if(key==='origenes'&&ins[i].origen===val)eI++;

      }

    }

    if(key==='tipos_equipo'||key==='unidades'){

      for(var j=0;j<eqs.length;j++){

        if(key==='tipos_equipo'&&eqs[j].tipo===val)eE++;

        if(key==='unidades'&&eqs[j].unidad===val)eE++;

      }

    }

    if(key==='unidades'||key==='unidades_transporte'){

      for(var a=0;a<apusA.length;a++){

        if(key==='unidades'&&apusA[a].unidad===val)eA++;

        (apusA[a].recursos_transporte||[]).forEach(function(r){if(key==='unidades_transporte'&&r.unidad===val)eA++});

      }

          }

    if(key==='categorias_apu'){

      for(var a2=0;a2<apusA.length;a2++){if(apusA[a2].categoria===val)eA++}

      

    }

    var total=eI+eE+eA;

    if(total>0){

      var parts=[];

      if(eI>0)parts.push(eI+' insumo'+(eI>1?'s':''));

      if(eE>0)parts.push(eE+' equipo'+(eE>1?'s':''));

      if(eA>0)parts.push(eA+' APU');

      

      return'"'+val+'" se usa en '+parts.join(', ')+'. No se puede eliminar.';

    }

    return null;

  }

/* ══════════════════ 4. EXPORTAR / ENTREGABLES (sub-componente de PresupuestosTab) ══════════════════ */
function PresEntregablesPanel({pres,presupuestos,calcResumenPres,calcItemVal,calcResumenFor,calcItemValFor,setTab}){
  var pendientesState=useState(null);var pendientes=pendientesState[0],setPendientes=pendientesState[1];
  if(!pres)return <PresBannerProyecto pres={pres} presupuestos={presupuestos} setTab={setTab}/>;
  var r=calcResumenPres();
  var itemsArr=r.itemsArr;
  var hijos=(presupuestos||[]).filter(function(p){return p.parent_id===pres.id});
  var esConsolidado=hijos.length>0;

  var ceCons=function(rr,cc){return XLSX.utils.encode_cell({r:rr,c:cc})};

  var generarHojaPresupuesto=function(p){
    var itemsArrP=p.items||[];
    var rp=calcResumenFor(p);
    var rows=[];
    rows.push(['PRESUPUESTO: '+(p.nombre||p.codigo)]);
    rows.push(['Codigo',p.codigo,'','Entidad contratante',p.entidad||'-']);
    rows.push(['No. Contrato',p.contrato||'-','','Ciudad',(p.ciudad||'-')+(p.departamento?(' / '+p.departamento):'')]);
    rows.push(['Objeto',p.objeto||'-']);
    rows.push(['Elaborado por',p.elaborado_por||'-','','Fecha',p.fecha_creacion||'-']);
    rows.push([]);
    var hdrRowIdx=rows.length;
    rows.push(['#','Item','Capitulo','Descripcion','UN','Cantidad','APU','Vr.Unitario','Vr.Total']);
    var rFirstItem=rows.length;
    itemsArrP.forEach(function(it,i){
      var cv=calcItemValFor(it,p);
      var rIdx=rows.length;
      rows.push([i+1,it.num_item,it.capitulo,it.descripcion,it.unidad,safeFloat(it.cantidad),cv.apu?cv.apu.codigo:'-',cv.vr_unit,'']);
      rows[rIdx][8]='=ROUND('+ceCons(rIdx,7)+'*'+ceCons(rIdx,5)+',2)';
    });
    var rLastItem=rows.length-1;
    var sumStartIdx=rows.length+1;
    rows.push([]);
    var rCd=rows.length;rows.push(['','','','','','','','Costo Directo Total',itemsArrP.length?'=ROUND(SUM('+ceCons(rFirstItem,8)+':'+ceCons(rLastItem,8)+'),2)':0]);
    var rAdm=rows.length;rows.push(['','','','','','','','Administracion ('+rp.pctA.toFixed(2)+'%)','=ROUND('+ceCons(rCd,8)+'*'+rp.pctA+'/100,2)']);
    var rImp=rows.length;rows.push(['','','','','','','','Imprevistos ('+rp.pctI.toFixed(2)+'%)','=ROUND('+ceCons(rCd,8)+'*'+rp.pctI+'/100,2)']);
    var rUti=rows.length;rows.push(['','','','','','','','Utilidad ('+rp.pctU.toFixed(2)+'%)','=ROUND('+ceCons(rCd,8)+'*'+rp.pctU+'/100,2)']);
    var rIva=rows.length;rows.push(['','','','','','','','IVA sobre Utilidad ('+rp.ivaPct+'%)','=ROUND('+ceCons(rUti,8)+'*'+rp.ivaPct+'/100,2)']);
    rows.push(['','','','','','','','VALOR TOTAL CONTRATO','=ROUND('+ceCons(rCd,8)+'+'+ceCons(rAdm,8)+'+'+ceCons(rImp,8)+'+'+ceCons(rUti,8)+'+'+ceCons(rIva,8)+',2)']);
    var ws=XLSX.utils.aoa_to_sheet(rows);
    convertirFormulasApuExcel(ws);
    ws['!cols']=[{wch:4},{wch:10},{wch:12},{wch:38},{wch:6},{wch:11},{wch:10},{wch:15},{wch:15}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}},{s:{r:3,c:1},e:{r:3,c:8}}];
    if(ws['A1'])ws['A1'].s={font:{bold:true,sz:14,color:{rgb:'1A2438'}}};
    for(var rr=1;rr<=4;rr++){
      ['A','D'].forEach(function(col){var k=col+(rr+1);if(ws[k])ws[k].s={font:{bold:true,sz:9,color:{rgb:'4D8FF7'}}}});
    }
    ['A','B','C','D','E','F','G','H','I'].forEach(function(col){var k=col+(hdrRowIdx+1);if(ws[k])ws[k].s={font:XLS_HDR_FONT,fill:XLS_HDR_FILL,alignment:{horizontal:'center'}}});
    for(var ri2=hdrRowIdx+1;ri2<hdrRowIdx+1+itemsArrP.length;ri2++){
      ['H','I'].forEach(function(col){var k=col+(ri2+1);if(ws[k]){if(ws[k].t!=='f')ws[k].t='n';ws[k].z=XLS_NUM_FMT;ws[k].s={alignment:{horizontal:'right'}}}});
    }
    for(var rs=sumStartIdx;rs<sumStartIdx+6;rs++){
      var kh=String.fromCharCode(72)+(rs+1),ki=String.fromCharCode(73)+(rs+1);
      if(ws[kh])ws[kh].s={font:{bold:true,sz:9}};
      if(ws[ki]){if(ws[ki].t!=='f')ws[ki].t='n';ws[ki].z=XLS_NUM_FMT;ws[ki].s={font:{bold:true,sz:9},alignment:{horizontal:'right'}}}
    }
    var lastRow=sumStartIdx+5;
    ['H','I'].forEach(function(col){var k=col+(lastRow+1);if(ws[k])ws[k].s={font:{bold:true,sz:10,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1A7A34'}},alignment:{horizontal:col==='I'?'right':'left'}}});
    return ws;
  };

  var exportExcelConsolidado=function(){
    var wb=XLSX.utils.book_new();
    var resRows=[];
    resRows.push(['PROYECTO: '+(pres.nombre||pres.codigo)]);

      var rh=calcResumenFor(h);
      var rIdx=resRows.length;
      resRows.push([h.codigo,h.nombre||'-',rh.cdTotal,rh.aiuTotal,rh.ivaUtilidad,'']);
      resRows[rIdx][5]='=ROUND('+ceCons(rIdx,2)+'+'+ceCons(rIdx,3)+'+'+ceCons(rIdx,4)+',2)';
    });

    resRows.push(['','TOTALES',hijos.length?'=ROUND(SUM('+ceCons(rFirstSub,2)+':'+ceCons(rLastSub,2)+'),2)':0,'','',hijos.length?'=ROUND(SUM('+ceCons(rFirstSub,5)+':'+ceCons(rLastSub,5)+'),2)':0]);

    XLSX.utils.book_append_sheet(wb,ws,'Presupuesto');

    var rows2=[['Item','APU','Nombre','Categoria','Mano de Obra','Equipos','Insumos','Transporte','Costo Directo Unit.','Cantidad','Vr.Total']];
    itemsArr.forEach(function(it){
      var cv=calcItemVal(it);
      if(!cv.apu)return;
      var c=cv.calc||{};
      var rIdx2=rows2.length;
      rows2.push([it.num_item,cv.apu.codigo,cv.apu.nombre,cv.apu.categoria,c.subPers||0,c.subEq||0,c.subIns||0,c.subTrans||0,c.totalDirecto||0,safeFloat(it.cantidad),'']);
      rows2[rIdx2][10]='=ROUND('+ce(rIdx2,8)+'*'+ce(rIdx2,9)+',2)';
    });
    var ws2=XLSX.utils.aoa_to_sheet(rows2);
    convertirFormulasApuExcel(ws2);
    ws2['!cols']=[{wch:8},{wch:10},{wch:32},{wch:18},{wch:13},{wch:12},{wch:12},{wch:12},{wch:15},{wch:10},{wch:15}];
    rows2[0].forEach(function(_,ci){var k=XLSX.utils.encode_cell({r:0,c:ci});if(ws2[k])ws2[k].s={font:XLS_HDR_FONT,fill:XLS_HDR_FILL,alignment:{horizontal:'center'}}});
    for(var ri3=1;ri3<rows2.length;ri3++){
      [4,5,6,7,8,10].forEach(function(ci){var k=XLSX.utils.encode_cell({r:ri3,c:ci});if(ws2[k]){if(ws2[k].t!=='f')ws2[k].t='n';ws2[k].z=XLS_NUM_FMT;ws2[k].s={alignment:{horizontal:'right'}}}});
    }
    XLSX.utils.book_append_sheet(wb,ws2,'Detalle APU');

    XLSX.writeFile(wb,'Presupuesto_'+(pres.codigo||'PPT')+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
    showToast('Presupuesto exportado a Excel',{type:'ok'});
  };

  var exportPDF=function(){

    doc.setFillColor(26,36,56);doc.rect(0,0,pageW,64,'F');
    doc.setTextColor(255,255,255);doc.setFontSize(15);doc.setFont(undefined,'bold');
    doc.text('PRESUPUESTO DE OBRA',40,28);
    doc.setFontSize(10);doc.setFont(undefined,'normal');
    doc.text((pres.nombre||pres.codigo)+'  |  '+pres.codigo,40,46);

    doc.setTextColor(0,0,0);
    var y=88;
    doc.setFontSize(9);
    function line(label,val){doc.setFont(undefined,'bold');doc.text(label+':',40,y);doc.setFont(undefined,'normal');doc.text(String(val||'-'),150,y);y+=14}

    line('Ciudad / Depto.',(pres.ciudad||'-')+(pres.departamento?(' / '+pres.departamento):''));

    line('Fecha de elaboración',pres.fecha_creacion);
    doc.setFont(undefined,'bold');doc.text('Objeto:',40,y);doc.setFont(undefined,'normal');
    var objLines=doc.splitTextToSize(pres.objeto||'-',pageW-190);
    doc.text(objLines,150,y);
    y+=Math.max(14,objLines.length*11)+10;

    var body=itemsArr.map(function(it,i){var cv=calcItemVal(it);return[i+1,it.num_item,it.descripcion,it.unidad,Number(it.cantidad).toLocaleString('en-US',{maximumFractionDigits:2}),cv.apu?cv.apu.codigo:'-','$ '+fmt(cv.vr_unit),'$ '+fmt(cv.vr_total)]});
    doc.autoTable({
      startY:y,
      head:[['#','Item','Descripcion','UN','Cant.','APU','Vr.Unit','Vr.Total']],
      body:body,theme:'grid',
      headStyles:{fillColor:[26,36,56],textColor:255,fontSize:8},
      bodyStyles:{fontSize:8},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:45},2:{cellWidth:175},3:{cellWidth:35},6:{halign:'right'},7:{halign:'right'}},
      margin:{left:40,right:40}
    });

    var y2=doc.lastAutoTable.finalY+18;
    if(y2>pageH-160){doc.addPage();y2=50}
    var sumBody=[
      ['Costo Directo Total','$ '+fmt(r.cdTotal)],
      ['Administracion ('+r.pctA.toFixed(2)+'%)','$ '+fmt(r.adm)],
      ['Imprevistos ('+r.pctI.toFixed(2)+'%)','$ '+fmt(r.imp)],
      ['Utilidad ('+r.pctU.toFixed(2)+'%)','$ '+fmt(r.uti)],
      ['IVA sobre Utilidad ('+r.ivaPct+'%)','$ '+fmt(r.ivaUtilidad)],
      ['VALOR TOTAL CONTRATO','$ '+fmt(r.valorTotal)]
    ];
    doc.autoTable({
      startY:y2,body:sumBody,theme:'plain',styles:{fontSize:9},
      columnStyles:{0:{cellWidth:220,fontStyle:'bold'},1:{cellWidth:110,halign:'right'}},
      margin:{left:pageW-40-330},
      didParseCell:function(hd){if(hd.row.index===5){hd.cell.styles.fontStyle='bold';hd.cell.styles.fontSize=10;hd.cell.styles.fillColor=[26,122,52];hd.cell.styles.textColor=255}}
    });

    var y3=doc.lastAutoTable.finalY+60;
    if(y3>pageH-60){doc.addPage();y3=80}
    doc.setDrawColor(150);doc.setTextColor(0,0,0);doc.setFontSize(8);
    doc.line(40,y3,240,y3);doc.text('Firma - Elaborado por',40,y3+12);
    doc.line(pageW-240,y3,pageW-40,y3);doc.text('Firma - Aprobado',pageW-240,y3+12);

    doc.save('Presupuesto_'+(pres.codigo||'PPT')+'_'+new Date().toISOString().slice(0,10)+'.pdf');
    showToast('Presupuesto exportado a PDF',{type:'ok'});
  };

  var exportarFormularioLleno=function(){

    var fo=pres.formulario_original;
    if(!fo||!fo.archivo_b64){showToast('Sube el formulario original para completar la exportacion',{type:'warn',dur:5000});return}
    var wbF=XLSX.read(fo.archivo_b64,{type:'base64'});
    var wsF=wbF.Sheets[wbF.SheetNames[0]];
    var mapeoF=fo.mapeo;
    var colU=colLetter(mapeoF.col_vr_unitario);
    var colT=colLetter(mapeoF.col_vr_total);
    var colC=mapeoF.col_cantidad!=null?colLetter(mapeoF.col_cantidad):null;
    var setCelda=function(addr,v,f){
      var prev=wsF[addr];
      var celda={t:'n',v:v};
      if(f)celda.f=f;
      if(prev&&prev.s)celda.s=prev.s;
      celda.z=(prev&&prev.z)?prev.z:'#,##0.00';
      wsF[addr]=celda;
    };
    (pres.items||[]).filter(function(it){return !esCapituloFinal(it)}).forEach(function(it){
      var cv=calcItemVal(it);
      var fila=it.fila_original;
      var addrU=colU+(fila+1),addrT=colT+(fila+1);
      setCelda(addrU,cv.vr_unit);
      if(colC){
        setCelda(addrT,cv.vr_total,'ROUND('+addrU+'*'+colC+(fila+1)+',2)');
      }else{
        setCelda(addrT,cv.vr_total);
      }
    });
    var range=XLSX.utils.decode_range(wsF['!ref']);
    var maxC=range.e.c;
    range.e.c=Math.max(maxC,mapeoF.col_vr_unitario,mapeoF.col_vr_total);
    wsF['!ref']=XLSX.utils.encode_range(range);
    var base=(fo.nombre_archivo||'formulario').replace(/\.xlsx?$/i,'');
    XLSX.writeFile(wbF,base+'_PRECIOS_'+pres.codigo+'.xlsx');

        <button className="btn" onClick={function(){setTab(12)}} style={{fontSize:10,padding:'4px 10px',border:'1px solid var(--bdr)',borderRadius:4,background:'none',color:'var(--tx2)',cursor:'pointer'}}>{'< Resumen'}</button>
      </div>
      <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
        <div style={{width:340,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{border:'1px solid var(--bdr)',borderRadius:4,padding:14,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--ac)'}}>EXCEL</div>
            <div style={{fontSize:10,color:'var(--tx2)',lineHeight:1.4}}>{esConsolidado?'Un solo archivo con hoja "RESUMEN" (una fila por sub-proyecto) mas una hoja completa por cada sub-proyecto.':'Hoja "Presupuesto" con datos del proyecto, items y resumen financiero. Hoja "Detalle APU" con el desglose de costos por item.'}</div>
            <button className="btn" onClick={exportExcel} style={{fontSize:11,padding:'6px 12px',border:'1px solid var(--ok)',borderRadius:4,background:'rgba(74,222,128,.08)',color:'var(--ok)',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}}><IconExport/> Exportar Excel{esConsolidado?' (Consolidado)':''}</button>
          </div>
          <div style={{border:'1px solid var(--bdr)',borderRadius:4,padding:14,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--ac)'}}>PDF</div>
            <div style={{fontSize:10,color:'var(--tx2)',lineHeight:1.4}}>Documento con datos del proyecto, tabla de items, resumen financiero y espacio de firma, listo para entregar a la entidad contratante.</div>
            <button className="btn" onClick={exportPDF} style={{fontSize:11,padding:'6px 12px',border:'1px solid var(--ac)',borderRadius:4,background:'rgba(77,143,247,.08)',color:'var(--ac)',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}}><IconExport/> Exportar PDF</button>
          </div>
          {!esConsolidado&&itemsArr.length===0&&<div style={{fontSize:10,color:'var(--warn)',padding:'8px 10px',border:'1px solid var(--warn)',borderRadius:4}}>Este presupuesto no tiene items. Ve a "Items" para agregarlos antes de exportar.</div>}
          {esConsolidado&&<div style={{fontSize:10,color:'var(--tx2)',padding:'8px 10px',border:'1px solid var(--bdr)',borderRadius:4}}>Proyecto principal con {hijos.length} sub-proyecto(s). El PDF solo exporta este nivel; usa Excel para el consolidado completo.</div>}
          {pres.formulario_original&&

              <div style={{fontSize:12,fontWeight:700,color:'var(--ac)'}}>FORMULARIO ORIGINAL</div>
              <div style={{fontSize:10,color:'var(--tx2)',lineHeight:1.4}}>Devuelve el mismo Excel de la entidad ({pres.formulario_original.nombre_archivo}) con las columnas de Vr. Unitario y Vr. Total llenas.</div>

            </div>

        <div style={{flex:1,border:'1px solid var(--bdr)',borderRadius:4}}>
          <div style={{padding:'6px 10px',background:'var(--bg3)',borderBottom:'1px solid var(--bdr)',fontSize:12,fontWeight:700,color:'var(--ac)'}}>VISTA PREVIA</div>
          <div style={{padding:12,fontSize:11}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{pres.nombre||'(sin nombre)'}</div>
            <div style={{color:'var(--tx2)',marginBottom:2}}>Entidad: {pres.entidad||'-'}</div>
            <div style={{color:'var(--tx2)',marginBottom:2}}>Contrato: {pres.contrato||'-'}</div>
            <div style={{color:'var(--tx2)',marginBottom:10}}>Ciudad: {pres.ciudad||'-'}{pres.departamento?(' / '+pres.departamento):''}</div>
            <table style={{width:'100%',fontSize:10}}>
              <tbody>
                <tr><td style={{padding:'3px 0',color:'var(--tx2)'}}>Costo Directo</td><td style={{padding:'3px 0',textAlign:'right'}}>{fmt(r.cdTotal)}</td></tr>
                <tr><td style={{padding:'3px 0',color:'var(--tx2)'}}>AIU ({r.aiuPct.toFixed(2)}%)</td><td style={{padding:'3px 0',textAlign:'right'}}>{fmt(r.aiuTotal)}</td></tr>
                <tr><td style={{padding:'3px 0',color:'var(--tx2)'}}>IVA sobre Utilidad</td><td style={{padding:'3px 0',textAlign:'right'}}>{fmt(r.ivaUtilidad)}</td></tr>
                <tr style={{borderTop:'1px solid var(--bdr)'}}><td style={{padding:'6px 0',fontWeight:700,color:'var(--ac)'}}>VALOR TOTAL</td><td style={{padding:'6px 0',textAlign:'right',fontWeight:700,color:'var(--ok)'}}>{fmt(r.valorTotal)}</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
      {pendientes&&
        <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',display:'flex',alignItems:'center',justifyContent:'center',zIndex:1000}} onClick={function(){setPendientes(null)}}>
