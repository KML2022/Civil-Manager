  };
  var addItemEnCapitulo=function(capIdx){
    if(readOnly)return;
    var arr=pres.items.slice();
    var insertAt=capIdx+1;
    while(insertAt<arr.length&&!esCapituloFinal(arr[insertAt]))insertAt++;
    arr.splice(insertAt,0,{id:uid(),num_item:'',capitulo:'',descripcion:'',unidad:'un',cantidad:1,apu_id:null,vr_unitario:0,vr_total:0,tiene_apu:false,alerta_sin_apu:false});
    saveItems(arr);
    setEditIdx(insertAt);
  };
  var toggleCapituloManual=function(itemId){
    if(readOnly)return;
    var arr=pres.items.slice();
    var idx=arr.findIndex(function(it){return it.id===itemId});
    if(idx<0)return;
    var it=arr[idx];
    arr[idx]=Object.assign({},it,{es_capitulo_manual:!esCapituloFinal(it)});
    saveItems(arr);
  };
  var delItem=async function(i){
    if(readOnly)return;if(!(await askConfirm('¿Desea eliminar "'+(pres.items[i].descripcion||'este ítem')+'"? Esta acción no se puede deshacer.')))return;
    var arr=pres.items.filter(function(_,j){return j!==i});
    saveItems(arr);
    if(editIdx===i)setEditIdx(null);
  };
  var updItem=function(i,k,v){
    if(readOnly)return;
    var arr=pres.items.slice();arr[i]=Object.assign({},arr[i]);arr[i][k]=v;
    saveItems(arr);
  };
  var openApuModal=function(i){if(!readOnly)setApuModal({open:true,itemIdx:i,search:'',catFilter:''})};
  var closeApuModal=function(){setApuModal({open:false,itemIdx:null,search:'',catFilter:''})};
  var filteredApus=function(){
    if(!apuModal.open)return[];
    var sn=apuModal.search?norm(apuModal.search):'';
    var cf=apuModal.catFilter;
    var result=[];
    for(var i=0;i<apus.length;i++){
      var a=apus[i];
      if(cf&&((a.categoria||'')!==cf))continue;
      if(sn){
        var aCod=norm(a.codigo||''),aNom=norm(a.nombre||''),aCat=norm(a.categoria||'');
        if(aCod.indexOf(sn)<0&&aNom.indexOf(sn)<0&&aCat.indexOf(sn)<0)continue;
      }
      result.push(a);
    }
    return result;
  };
  var assignApu=function(aid){
    if(apuModal.itemIdx===null||aid===undefined)return;
    var i=apuModal.itemIdx;
    var apuOrig=null;
    for(var k=0;k<apus.length;k++){if(apus[k].id===aid){apuOrig=apus[k];break}}
    if(!apuOrig)return;
    // Clonar el APU al snapshot del presupuesto para no romper la trazabilidad si el catalogo cambia despues
    var snap=(pres.apus_snap||[]).slice();
    var clon=snap.find(function(a){return a.apu_origen_id===apuOrig.id});
    if(!clon){
      clon=Object.assign({},apuOrig,{id:uid(),apu_origen_id:apuOrig.id});
      snap.push(clon);
    }
    var arr=pres.items.slice();
    arr[i]=Object.assign({},arr[i],{apu_id:clon.id,tiene_apu:true,alerta_sin_apu:false});
    saveItems(arr,{apus_snap:snap});
    closeApuModal();
    showToast('APU asignado',{type:'ok',dur:2000});
  };
  var unassignApu=async function(i){
    if(readOnly)return;if(!(await askConfirm('¿Desea quitar el APU asignado a este ítem? Esta acción no se puede deshacer.')))return;
    var arr=pres.items.slice();arr[i]=Object.assign({},arr[i],{apu_id:null,tiene_apu:false});
    saveItems(arr);
    showToast('APU removido',{type:'ok',dur:2000});
  };

  var mapeosGuardados=(data.config_listas&&data.config_listas.mapeos_formulario)||[];

  var onFileSelect=function(e){
    var file=e.target.files[0];
    if(!file)return;
    if(!file.name.match(/\.xlsx?$/i)){showToast('Solo se permiten archivos .xlsx o .xls',{type:'err'});e.target.value='';return}
    var reader=new FileReader();
    reader.onload=function(ev){
      var wb=XLSX.read(new Uint8Array(ev.target.result),{type:'array',cellStyles:true});
      var ws=wb.Sheets[wb.SheetNames[0]];
      var todas=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:true});
      setArchivoRaw(wb);
      setNombreArchivo(file.name);
      setPreviewFilas(todas.slice(0,50));
      setPreviewMerges(ws['!merges']||[]);
      var filaInicio=autoDetectarFilaInicio(todas);
      setMapeo(Object.assign(mapeoVacio(),{fila_inicio:filaInicio}));
      setConCodigo2(false);
      setFuenteApu('item');
      setFase('mapeo');
    };
    reader.readAsArrayBuffer(file);
    e.target.value='';
  };

  var setCol=function(key,val){setMapeo(function(m){return Object.assign({},m,{[key]:val===''?null:parseInt(val,10)})})};

  var aplicarMapeoGuardado=function(id){
    if(!id)return;
    var mg=mapeosGuardados.find(function(m){return m.id===id});
    if(!mg)return;
    setMapeo(Object.assign({},mg,{nombre_mapeo:''}));
    setConCodigo2(mg.col_codigo_2!=null);
    setFuenteApu(mg.col_codigo_apu==null||mg.col_codigo_apu===mg.col_item?'item':(mg.col_codigo_apu===mg.col_codigo_1?'codigo_1':'codigo_2'));
  };

  var mapeoValido=MAPEO_CAMPOS.every(function(c){return mapeo[c.key]!=null});

  var cancelarMapeo=function(){
    setArchivoRaw(null);setPreviewFilas([]);setPreviewMerges([]);setNombreArchivo('');setMapeo(mapeoVacio());
    setFase(pres.formulario_original?'revision':'inicio');
  };

  var importarFormulario=function(){
    if(!archivoRaw||!mapeoValido)return;
    var ws=archivoRaw.Sheets[archivoRaw.SheetNames[0]];
    var filas=XLSX.utils.sheet_to_json(ws,{header:1,defval:'',blankrows:true});
    var colApu=fuenteApu==='codigo_1'?mapeo.col_codigo_1:fuenteApu==='codigo_2'?mapeo.col_codigo_2:mapeo.col_item;
    var mapeoFinal=Object.assign({},mapeo,{col_codigo_apu:colApu});

    var b64=null;var archivoDemasiadoGrande=false;
    try{
      var out=XLSX.write(archivoRaw,{type:'base64',bookType:'xlsx'});
      if(out.length<4000000){b64=out}else{archivoDemasiadoGrande=true}
    }catch(ex){archivoDemasiadoGrande=true}

    var items=[];
    var capituloActual='';
    for(var i=mapeoFinal.fila_inicio;i<filas.length;i++){
      var fila=filas[i];
      var tieneContenido=fila.some(function(c){return String(c||'').trim()!==''});
      if(!tieneContenido)continue;
      var esCap=detectarFilaCapitulo(fila,mapeoFinal);
      if(esCap){
        capituloActual=String(fila[mapeoFinal.col_descripcion]||'').trim();
        items.push({id:uid(),fila_original:i,es_capitulo:true,es_capitulo_manual:null,num_item:String(fila[mapeoFinal.col_item]||'').trim(),descripcion:capituloActual,capitulo:'',unidad:'',cantidad:0,apu_id:null,tiene_apu:false,alerta_sin_apu:false});
      }else{
        var cantRaw=String(fila[mapeoFinal.col_cantidad]||'').trim();
        var cant=parseCantidad(cantRaw);
        items.push({
          id:uid(),fila_original:i,es_capitulo:false,es_capitulo_manual:null,
          num_item:String(fila[mapeoFinal.col_item]||'').trim(),
          codigo_1:mapeoFinal.col_codigo_1!=null?String(fila[mapeoFinal.col_codigo_1]||'').trim():'',
          codigo_2:mapeoFinal.col_codigo_2!=null?String(fila[mapeoFinal.col_codigo_2]||'').trim():'',
          codigo_apu:String(fila[mapeoFinal.col_codigo_apu]||'').trim(),
          descripcion:String(fila[mapeoFinal.col_descripcion]||'').trim(),
          unidad:String(fila[mapeoFinal.col_unidad]||'').trim(),
          cantidad:cant,
          capitulo:capituloActual,
          apu_id:null,tiene_apu:false,alerta_sin_apu:false
        });
      }
    }

    if(mapeoFinal.nombre_mapeo&&mapeoFinal.nombre_mapeo.trim()){
      var mapeoGuardar=Object.assign({},mapeoFinal,{id:uid()});
      var nuevosCL=Object.assign({},data.config_listas,{mapeos_formulario:((data.config_listas||{}).mapeos_formulario||[]).concat([mapeoGuardar])});
      onChange(Object.assign({},data,{config_listas:nuevosCL}));
    }

    var n=presupuestos.slice();
    var idxPres=presupuestos.indexOf(pres);
    n[idxPres]=Object.assign({},n[idxPres],{
      items:items,
      formulario_original:{
        archivo_b64:b64,
        archivo_adjunto:b64!=null,
        nombre_archivo:nombreArchivo,
        fecha_importacion:new Date().toISOString().slice(0,10),
        total_filas:filas.length,
        fila_inicio:mapeoFinal.fila_inicio,
        mapeo:mapeoFinal
      }
    });
    onChange(Object.assign({},data,{presupuestos:n}));

    var itemsReales=items.filter(function(it){return !esCapituloFinal(it)});
    if(archivoDemasiadoGrande){
      showToast('Items importados. El archivo original supera 4MB y no se pudo adjuntar — la exportación de "formulario lleno" no estará disponible.',{type:'warn',dur:6000});
    }else{
      showToast('Importado: '+itemsReales.length+' items, '+(items.length-itemsReales.length)+' capitulos detectados. Formulario adjuntado a '+n[idxPres].codigo+'.',{type:'ok',dur:4000});
    }
    setArchivoRaw(null);setPreviewFilas([]);setPreviewMerges([]);
    setFase('revision');
  };

  var reimportar=async function(){
    if(!(await askConfirm('Subir un nuevo formulario reemplazará los items actuales de este presupuesto. ¿Desea continuar?')))return;
    setFase('inicio');
  };

  var sel=function(props){return <select className="ni sel" style={{fontSize:10,padding:'2px 4px'}} {...props}/>};

  if(fase==='inicio'){
    return(
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <TituloSubTab pres={pres} presupuestos={presupuestos} tituloSubTab="Formulario de Cantidades y Precios"/>
        <div style={{padding:'34px 20px',border:'1px dashed var(--bdr)',borderRadius:4,textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:12}}>
          <div style={{fontSize:12,color:'var(--tx2)',maxWidth:480,lineHeight:1.5}}>Sube el formulario de presupuesto en Excel (.xlsx) o crea los items directamente. El sistema detecta automáticamente en qué fila empiezan los ítems y cuáles filas son capítulos.</div>
          <div style={{display:'flex',gap:10}}>
            <button className="btn" onClick={function(){fileRef.current&&fileRef.current.click()}} style={{fontSize:12,padding:'8px 16px',border:'1px solid var(--ok)',borderRadius:4,background:'rgba(74,222,128,.08)',color:'var(--ok)',cursor:'pointer'}}>📥 Subir formulario Excel</button>
            <button className="btn" onClick={function(){setFase('revision')}} style={{fontSize:12,padding:'8px 16px',border:'1px solid var(--ac)',borderRadius:4,background:'rgba(77,143,247,.06)',color:'var(--ac)',cursor:'pointer'}}>✏ Crear items manualmente</button>
          </div>
          <input type="file" ref={fileRef} accept=".xlsx,.xls" style={{display:'none'}} onChange={onFileSelect}/>
        </div>
      </div>
    );
  }

  if(fase==='mapeo'){
    var maxCols=Math.min(20,previewFilas.reduce(function(m,r){return Math.max(m,r.length)},1));
    var campoMapeo=function(c,label,requerido){
      var activo=campoActivo===c.key;
      var mapeado=mapeo[c.key]!=null;
      var filaEj=previewFilas[mapeo.fila_inicio];
      var valorEjemplo=mapeado&&filaEj?String(filaEj[mapeo[c.key]]||''):'';
      return(
        <div key={c.key} style={{border:activo?'2px solid var(--ok)':'1px solid var(--bdr)',background:activo?'rgba(74,222,128,.08)':'transparent',borderRadius:4,padding:8}}>
          <label onClick={function(){setCampoActivo(activo?null:c.key)}} style={{fontSize:10,color:activo?'var(--ok)':'var(--tx2)',display:'block',marginBottom:3,cursor:'pointer',fontWeight:activo?700:400}}>{label}{requerido&&<span style={{color:'var(--err)'}}> *</span>}{activo&&<span style={{color:'var(--ok)',marginLeft:4}}>{'← clic en columna'}</span>}</label>
          {sel({value:mapeo[c.key]==null?'':mapeo[c.key],onChange:function(e){setCol(c.key,e.target.value)},children:[
            <option key="_" value="">— Elegir —</option>
          ].concat(Array.from({length:maxCols}).map(function(_,ci){return <option key={ci} value={ci}>{colLetter(ci)}</option>}))})}
          {mapeado&&valorEjemplo&&
            <div style={{fontSize:9,color:'var(--tx3)',marginTop:2}}>Columna {colLetter(mapeo[c.key])} — ej: "{valorEjemplo}"</div>
          }
        </div>
      );
    };
    return(
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <TituloSubTab pres={pres} presupuestos={presupuestos} tituloSubTab={'Mapeo de columnas — '+nombreArchivo}/>
        <div className="xl-wrap" style={{maxHeight:220,overflow:'auto'}}>
          <table style={{fontSize:9,borderCollapse:'collapse'}}>
            <thead style={{position:'sticky',top:0,zIndex:2}}><tr>
              <th style={{padding:'2px 6px',background:'var(--bg2)',position:'sticky',top:0}}>#</th>
              {Array.from({length:maxCols}).map(function(_,ci){return(
                <th key={ci} onClick={function(){if(campoActivo){setCol(campoActivo,ci);setCampoActivo(null)}}} title={campoActivo?'Clic para asignar columna '+colLetter(ci)+' a '+campoActivo:''} style={{padding:'2px 6px',background:campoActivo?'var(--ok)':'var(--bg2)',color:campoActivo?'#fff':'inherit',cursor:campoActivo?'crosshair':'default',fontWeight:700,userSelect:'none',position:'sticky',top:0}}>{colLetter(ci)}</th>
              )})}
            </tr></thead>
            <tbody>
              {previewFilas.map(function(fila,fi){
                return(
                  <tr key={fi} style={fi===mapeo.fila_inicio?{background:'rgba(74,222,128,.1)'}:undefined}>
                    <td style={{padding:'2px 6px',color:'var(--tx3)'}}>{fi}</td>
                    {Array.from({length:maxCols}).map(function(_,ci){
                      var span=getMergeSpan(fi,ci,previewMerges);
                      if(span===0)return null;
                      return <td key={ci} colSpan={span>1?span:undefined} style={{padding:'2px 6px',whiteSpace:'nowrap',textAlign:span>1?'center':'left'}}>{String(fila[ci]!=null?fila[ci]:'')}</td>;
                    })}
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>

        {mapeosGuardados.length>0&&
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            <span style={{fontSize:11,color:'var(--tx2)'}}>Aplicar mapeo guardado:</span>
            <select className="ni sel" style={{fontSize:11}} defaultValue="" onChange={function(e){aplicarMapeoGuardado(e.target.value)}}>
              <option value="">— Seleccionar —</option>
              {mapeosGuardados.map(function(m){return <option key={m.id} value={m.id}>{m.nombre_mapeo||m.id}</option>})}
            </select>
          </div>
        }

        <div className="sec-hdr" style={{border:'1px solid var(--bdr)',borderRadius:4,padding:'6px 10px'}}>
          <span className="title" style={{fontSize:13}}>2. Asignar columnas</span>
        </div>
        <div style={{border:'1px solid var(--bdr)',borderRadius:4,padding:12,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',textTransform:'uppercase'}}>Campos obligatorios</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            <div>
              <label style={{fontSize:10,color:'var(--tx2)',display:'block',marginBottom:3}}>¿Desde qué fila empiezan los datos?</label>
              <input type="number" className="ni" style={{width:70,fontSize:11}} value={mapeo.fila_inicio} onChange={function(e){setMapeo(Object.assign({},mapeo,{fila_inicio:parseInt(e.target.value,10)||0}))}}/>
            </div>
            {MAPEO_CAMPOS.map(function(c){
              return campoMapeo(c,c.label,c.requerido);
            })}
          </div>
          <div style={{fontSize:10,fontWeight:700,color:'var(--tx2)',textTransform:'uppercase',marginTop:6}}>Campos opcionales</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10}}>
            <div style={{border:campoActivo==='col_codigo_1'?'2px solid var(--ok)':'1px solid var(--bdr)',background:campoActivo==='col_codigo_1'?'rgba(74,222,128,.08)':'transparent',borderRadius:4,padding:8}}>
              <label style={{fontSize:10,color:'var(--tx2)',display:'block',marginBottom:3}}><input type="checkbox" checked={conCodigo2} onChange={function(e){setConCodigo2(e.target.checked);if(!e.target.checked)setCol('col_codigo_2','')}}/> ¿Hay segunda columna de código?</label>
              <label onClick={function(){setCampoActivo(campoActivo==='col_codigo_1'?null:'col_codigo_1')}} style={{fontSize:10,color:campoActivo==='col_codigo_1'?'var(--ok)':'var(--tx2)',display:'block',marginBottom:3,marginTop:6,cursor:'pointer',fontWeight:campoActivo==='col_codigo_1'?700:400}}>Columna — Código 1{campoActivo==='col_codigo_1'&&<span style={{color:'var(--ok)',marginLeft:4}}>{'← clic en columna'}</span>}</label>
              {sel({value:mapeo.col_codigo_1==null?'':mapeo.col_codigo_1,onChange:function(e){setCol('col_codigo_1',e.target.value)},children:[<option key="_" value="">— Ninguna —</option>].concat(Array.from({length:maxCols}).map(function(_,ci){return <option key={ci} value={ci}>{colLetter(ci)}</option>}))})}
              {mapeo.col_codigo_1!=null&&previewFilas[mapeo.fila_inicio]&&
                <div style={{fontSize:9,color:'var(--tx3)',marginTop:2}}>Columna {colLetter(mapeo.col_codigo_1)} — ej: "{String(previewFilas[mapeo.fila_inicio][mapeo.col_codigo_1]||'')}"</div>
              }
            </div>
            {conCodigo2&&
              <div style={{border:campoActivo==='col_codigo_2'?'2px solid var(--ok)':'1px solid var(--bdr)',background:campoActivo==='col_codigo_2'?'rgba(74,222,128,.08)':'transparent',borderRadius:4,padding:8}}>
                <label onClick={function(){setCampoActivo(campoActivo==='col_codigo_2'?null:'col_codigo_2')}} style={{fontSize:10,color:campoActivo==='col_codigo_2'?'var(--ok)':'var(--tx2)',display:'block',marginBottom:3,cursor:'pointer',fontWeight:campoActivo==='col_codigo_2'?700:400}}>Columna — Código 2{campoActivo==='col_codigo_2'&&<span style={{color:'var(--ok)',marginLeft:4}}>{'← clic en columna'}</span>}</label>
                {sel({value:mapeo.col_codigo_2==null?'':mapeo.col_codigo_2,onChange:function(e){setCol('col_codigo_2',e.target.value)},children:[<option key="_" value="">— Ninguna —</option>].concat(Array.from({length:maxCols}).map(function(_,ci){return <option key={ci} value={ci}>{colLetter(ci)}</option>}))})}
                {mapeo.col_codigo_2!=null&&previewFilas[mapeo.fila_inicio]&&
                  <div style={{fontSize:9,color:'var(--tx3)',marginTop:2}}>Columna {colLetter(mapeo.col_codigo_2)} — ej: "{String(previewFilas[mapeo.fila_inicio][mapeo.col_codigo_2]||'')}"</div>
                }
              </div>
            }
            <div style={{border:'1px solid var(--bdr)',borderRadius:4,padding:8}}>
              <label style={{fontSize:10,color:'var(--tx2)',display:'block',marginBottom:3}}>¿Cuál código usar para los APU?</label>
              <select className="ni sel" style={{fontSize:11}} value={fuenteApu} onChange={function(e){setFuenteApu(e.target.value)}}>
                <option value="item">Número de ítem</option>
                <option value="codigo_1">Código 1</option>
                {conCodigo2&&<option value="codigo_2">Código 2</option>}
              </select>
            </div>
            <div style={{border:'1px solid var(--bdr)',borderRadius:4,padding:8}}>
              <label style={{fontSize:10,color:'var(--tx2)',display:'block',marginBottom:3}}>Guardar este mapeo como...</label>
              <input className="ni" style={{fontSize:11,width:'100%'}} placeholder="(opcional)" value={mapeo.nombre_mapeo} onChange={function(e){setMapeo(Object.assign({},mapeo,{nombre_mapeo:e.target.value}))}}/>
            </div>
          </div>
        </div>

        <div style={{display:'flex',gap:8}}>
          <button className="btn" disabled={!mapeoValido} onClick={importarFormulario} style={{fontSize:11,padding:'6px 14px',border:'1px solid var(--ok)',borderRadius:4,background:mapeoValido?'rgba(74,222,128,.08)':'transparent',color:mapeoValido?'var(--ok)':'var(--tx3)',cursor:mapeoValido?'pointer':'not-allowed'}}>Confirmar mapeo</button>
          <button className="btn" onClick={cancelarMapeo} style={{fontSize:11,padding:'6px 14px',border:'1px solid var(--bdr)',borderRadius:4,background:'none',color:'var(--tx2)',cursor:'pointer'}}>Cancelar</button>
        </div>
      </div>
    );
  }

  /* fase === 'revision': tabla unica de items, sea que vengan de importar Excel o se hayan creado a mano */
  var itemsArr=pres.items||[];
  var fo=pres.formulario_original;
  var itemsReales=itemsArr.filter(function(it){return !esCapituloFinal(it)});
  var nCapitulos=itemsArr.length-itemsReales.length;
  var cdTotal=0;
  for(var ii=0;ii<itemsArr.length;ii++){cdTotal+=calcItemVal(itemsArr[ii]).vr_total}

  var itemsFiltrados=itemsArr.filter(function(it){
    if(!busq)return true;
    var b=norm(busq);
    return norm(it.descripcion||'').indexOf(b)>=0||norm(it.capitulo||'').indexOf(b)>=0||norm(it.num_item||'').indexOf(b)>=0;
  });
  var PAGE_SIZE=50;
  var totalPaginas=Math.max(1,Math.ceil(itemsFiltrados.length/PAGE_SIZE));
  var itemsPagina=itemsFiltrados.slice(page*PAGE_SIZE,(page+1)*PAGE_SIZE);

  return(
    <div style={{display:'flex',flexDirection:'column',gap:8,height:'calc(100vh - 150px)',minHeight:0}}>
      <div style={{flexShrink:0,display:'flex',flexDirection:'column',gap:8}}>
        <TituloSubTab pres={pres} presupuestos={presupuestos} tituloSubTab="Formulario de Cantidades y Precios" extra={<span style={{fontSize:10,color:'var(--tx3)'}}>{itemsArr.length} items &middot; CD: {fmt(cdTotal)}</span>}/>
        {fo&&

          <input className="ni" placeholder="Buscar item..." value={busq} onChange={function(e){setBusq(e.target.value);setPage(0)}} style={{width:160,height:22,fontSize:10,border:'1px solid var(--ac)',borderRadius:4,marginLeft:8}}/>
          {readOnly&&<span style={{fontSize:10,color:'var(--warn)',marginLeft:8,padding:'2px 8px',border:'1px solid var(--warn)',borderRadius:3}}>Solo lectura (presupuesto {estadoLabel(pres.estado).toLowerCase()})</span>}

        <div className="xl-scroll" style={{overflowX:'auto',flex:'1 1 0',minHeight:0,maxHeight:'none'}}>

            <colgroup>

            <tbody>

              {itemsPagina.map(function(it){
                var i=itemsArr.indexOf(it);

                    <td className="col-act" style={{textAlign:'center',whiteSpace:'nowrap',background:'#1E3A5F',display:'flex',alignItems:'center',justifyContent:'center',width:100,boxSizing:'border-box'}}>
                      <span style={{width:24,display:'inline-flex',justifyContent:'center'}}>{!readOnly&&<button onClick={function(){setEditIdx(isEdit?null:i)}} title="Editar" style={{background:'none',border:'none',cursor:'pointer',padding:0,color:'#fff'}}><IconEdit/></button>}</span>
                      <span style={{width:24,display:'inline-flex',justifyContent:'center'}}>{!readOnly&&<button onClick={function(){addItemEnCapitulo(i)}} title="Agregar item en este capitulo" style={{background:'none',border:'none',cursor:'pointer',padding:0,color:'var(--ok)',fontSize:16,fontWeight:700,lineHeight:1,verticalAlign:'middle'}}>+</button>}</span>
                      <span style={{width:24,display:'inline-flex',justifyContent:'center'}}>{!readOnly&&<button onClick={function(){toggleCapituloManual(it.id)}} title="Desmarcar como capitulo" style={{background:'none',border:'none',cursor:'pointer',padding:0,color:'var(--ok)',fontSize:15,fontWeight:700,verticalAlign:'middle'}}>⇄</button>}</span>
                      <span style={{width:24,display:'inline-flex',justifyContent:'center'}}>{!readOnly&&<button className="btn-del" onClick={function(){delItem(i)}} title="Eliminar" style={{background:'none',border:'none',cursor:'pointer',padding:0}}><IconDel/></button>}</span>
                    </td>

                );
                return(
                  <tr key={it.id} onBlur={function(e){if(!e.currentTarget.contains(e.relatedTarget))setEditIdx(null)}}>
                    <td style={{textAlign:'center',color:'var(--tx3)'}}>{i+1}</td>
                    <td style={{textAlign:'center'}}>{isEdit?<input className="ni" value={it.num_item} onChange={function(e){updItem(i,'num_item',e.target.value)}} style={{width:'100%',fontSize:10,textAlign:'center'}} autoFocus/>:it.num_item}</td>
                    <td style={{whiteSpace:'normal',wordBreak:'break-word'}}>{isEdit?<input className="ni" value={it.descripcion} onChange={function(e){updItem(i,'descripcion',e.target.value)}} style={{width:'100%',fontSize:10}} placeholder="Descripcion"/>:it.descripcion}</td>
                    <td style={{textAlign:'center'}}>{isEdit?<input className="ni" value={it.unidad} onChange={function(e){updItem(i,'unidad',e.target.value)}} style={{width:'100%',fontSize:10,textAlign:'center'}}/>:it.unidad}</td>
                    <td style={{textAlign:'right'}}>{isEdit?<NumInput step=".01" inputMode="decimal" value={it.cantidad} onChange={function(v){updItem(i,'cantidad',v)}} style={{width:'100%',fontSize:10,textAlign:'right'}} decimals={2}/>:fmt(it.cantidad)}</td>
                    <td style={{textAlign:'center'}}>
                      {apu?<span style={{fontSize:9,color:'var(--ok)',fontWeight:600}}>{apu.codigo}</span>:<span style={{fontSize:9,color:'var(--err)'}}>Sin asignar</span>}
                    </td>
                    <td style={{textAlign:'right'}}>{apu?fmt(c.vr_unit):'-'}</td>
                    <td style={{textAlign:'right',fontWeight:600}}>{apu?fmt(c.vr_total):'-'}</td>
                    <td className="col-act" style={{textAlign:'center',whiteSpace:'nowrap',display:'flex',alignItems:'center',justifyContent:'center',width:100,boxSizing:'border-box'}}>
                      <span style={{width:24,display:'inline-flex',justifyContent:'center'}}>{!readOnly&&<button onClick={function(){setEditIdx(isEdit?null:i)}} title="Editar" style={{background:'none',border:'none',cursor:'pointer',padding:0}}><IconEdit/></button>}</span>
                      <span style={{width:24,display:'inline-flex',justifyContent:'center'}}>{!readOnly&&(apu?
                        <button onClick={function(){unassignApu(i)}} title="Quitar APU" style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',padding:0,fontSize:15,fontWeight:700,verticalAlign:'middle'}}>⊘</button>
                        :<button onClick={function(){openApuModal(i)}} title="Asignar APU" style={{background:'none',border:'none',color:'var(--ac)',cursor:'pointer',padding:0,fontSize:11,fontWeight:700,verticalAlign:'middle'}}>APU</button>

                      <span style={{width:24,display:'inline-flex',justifyContent:'center'}}>{!readOnly&&<button className="btn-del" onClick={function(){delItem(i)}} title="Eliminar" style={{background:'none',border:'none',cursor:'pointer',padding:0}}><IconDel/></button>}</span>
                    </td>

                );

            </tbody>
          </table>
        </div>
        {totalPaginas>1&&(
          <div style={{display:'flex',alignItems:'center',gap:8,padding:'6px 12px',borderTop:'1px solid var(--bdr)',fontSize:11,color:'var(--tx3)',width:710,boxSizing:'border-box'}}>
            <button disabled={page===0} onClick={function(){setPage(page-1)}} style={{padding:'2px 8px',fontSize:10,opacity:page===0?0.4:1,cursor:page===0?'not-allowed':'pointer'}}>{'← Anterior'}</button>
            <span>Página {page+1} de {totalPaginas} ({itemsFiltrados.length} ítems)</span>
            <button disabled={page>=totalPaginas-1} onClick={function(){setPage(page+1)}} style={{padding:'2px 8px',fontSize:10,opacity:page>=totalPaginas-1?0.4:1,cursor:page>=totalPaginas-1?'not-allowed':'pointer'}}>{'Siguiente →'}</button>
          </div>
        )}
      </div>
      {apuModal.open&&(
        <div className="modal-overlay" onClick={closeApuModal}>
          <div className="modal-box" style={{width:760}} onClick={function(e){e.stopPropagation()}}>
            <div className="modal-hdr"><span className="title">Asignar APU al item</span><button onClick={closeApuModal} style={{background:'none',border:'none',cursor:'pointer',padding:2,color:'var(--ok)'}}><IconX/></button></div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <select className="ni" value={apuModal.catFilter} onChange={function(e){setApuModal(Object.assign({},apuModal,{catFilter:e.target.value}))}} style={{width:200,height:22,fontSize:11,border:'1px solid var(--ac)',borderRadius:4}}>
                  <option value=''>Todas las categorias</option>
                  {(categorias_apu||[]).map(function(c){return <option key={c.codigo} value={c.categoria}>{c.categoria}</option>})}
                </select>
                <input className="ni" placeholder="Buscar APU..." value={apuModal.search} onChange={function(e){setApuModal(Object.assign({},apuModal,{search:e.target.value}))}} style={{flex:1,height:22,fontSize:11,border:'1px solid var(--ok)',borderRadius:4}} autoFocus/>
              </div>
              <div className="xl-scroll" style={{maxHeight:380,overflowY:'auto',border:'1px solid var(--bdr)',borderRadius:4}}>
                <table style={{tableLayout:'fixed',width:'100%',fontSize:10}}>
                  <colgroup><col className="cw-90"/><col className="cw-260"/><col className="cw-190"/><col className="cw-60"/><col className="cw-80"/></colgroup>
                  <thead style={{position:'sticky',top:0,background:'var(--bg3)'}}><tr><th>Codigo</th><th>Nombre</th><th>Categoria</th><th>UN</th><th>Accion</th></tr></thead>
                  <tbody>
                    {filteredApus().length===0&&<tr><td colSpan={5} style={{textAlign:'center',padding:'20px',color:'var(--tx3)'}}>Sin resultados</td></tr>}
                    {filteredApus().map(function(a){return(
                      <tr key={a.id}>
                        <td style={{fontWeight:600,color:'var(--ac)'}}>{a.codigo||'-'}</td>
                        <td>{a.nombre||'-'}</td>
                        <td style={{color:'var(--tx2)'}}>{a.categoria||'-'}</td>
                        <td style={{textAlign:'center'}}>{a.unidad||'-'}</td>
                        <td style={{textAlign:'center'}}><button onClick={function(){assignApu(a.id)}} style={{fontSize:10,padding:'2px 8px',border:'1px solid var(--ok)',borderRadius:3,background:'rgba(74,222,128,.08)',color:'var(--ok)',cursor:'pointer',fontWeight:600}}>Seleccionar</button></td>
                      </tr>
                    )})}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function PresupuestosTab({data,onChange,cargosCalc,esHora,eqMap,insMap,factorPrest,usarFpEnApu,equipos,insumos,apusBasico,categorias_apu,tab,setTab}){
  data=data||{};
  equipos=equipos||[];
  insumos=insumos||[];
  cargosCalc=cargosCalc||[];
  categorias_apu=categorias_apu||[];
  apusBasico=apusBasico||[];
  var presupuestos=data.presupuestos||[];
  var apus=data.apus||[];
  var config=data.config||{};
  var[selPresIdx,setSelPresIdx]=useState(null);
  var[editPresForm,setEditPresForm]=useState(null);
  var[apuModal,setApuModal]=useState({open:false,itemIdx:null,search:'',catFilter:''});
  var presActivoIdx=presupuestos.findIndex(function(p){return p.activo===true});
  var selFinal=selPresIdx!==null?selPresIdx:presActivoIdx;
  var pres=(selFinal!==-1&&presupuestos[selFinal])?presupuestos[selFinal]:null;
  var herrPct=config.herr_pct!=null?Number(config.herr_pct):5;

  var personMap=useMemo(function(){return new Map((cargosCalc||[]).map(function(c){return[c.id,c]}))},[cargosCalc]);
  var abCalcList=useMemo(function(){
    var list=[];
    (apusBasico||[]).forEach(function(a){
      list.push(calcAPU(a,cargosCalc,equipos,insumos,null,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap));
    });
    return list;
  },[apusBasico,cargosCalc,equipos,insumos,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap]);

  function estadoColor(e){return e==='borrador'?'var(--warn)':e==='en_revision'?'var(--ac)':'var(--ok)'}
  function estadoLabel(e){return e==='borrador'?'Borrador':e==='en_revision'?'En Revision':'Cerrado'}

  function genCodigoPpto(){
    var maxN=0;
    presupuestos.forEach(function(p){var m=(p.codigo||'').match(/PPT-(\d+)/);if(m)maxN=Math.max(maxN,parseInt(m[1]))});
    return 'PPT-'+String(maxN+1).padStart(3,'0');
  }

  function addPresupuesto(){
    var nuevo={
      id:uid(),codigo:genCodigoPpto(),nombre:'',entidad:'',contrato:'',objeto:'',plazo:0,
      fecha_creacion:new Date().toISOString().slice(0,10),ciudad:'',departamento:'',elaborado_por:'',
      activo:false,con_sub_proyectos:false,tipo_proyecto:'',observaciones:'',parent_id:null,
      estado:'borrador',fecha_cierre:null,items:[],
      aiu_override:{activo:false,pct_a:0,pct_i:0,pct_u:0,iva_pct:19},
      factores_snap:(data.factoresPrestaciones||[]).map(function(f){return Object.assign({},f)}),
      cargos_snap:(data.cargos||[]).map(function(c){return Object.assign({},c)}),
      insumos_snap:(data.insumos||[]).map(function(i){return Object.assign({},i)}),
      equipos_snap:(data.equipos||[]).map(function(e){return Object.assign({},e)}),
      apus_snap:[]
    };
    var n=presupuestos.concat([nuevo]);
    onChange(Object.assign({},data,{presupuestos:n}));
    setSelPresIdx(n.length-1);
    showToast('Presupuesto '+nuevo.codigo+' creado',{type:'ok',dur:2000});
  }

  function addSubProyecto(parentIdx){
    var parent=presupuestos[parentIdx];
    if(!parent)return;
    var nuevo={
      id:uid(),codigo:genCodigoPpto(),parent_id:parent.id,con_sub_proyectos:false,activo:false,
      nombre:'',entidad:parent.entidad||'',contrato:parent.contrato||'',objeto:'',plazo:0,
      fecha_creacion:new Date().toISOString().slice(0,10),ciudad:parent.ciudad||'',departamento:parent.departamento||'',
      elaborado_por:parent.elaborado_por||'',tipo_proyecto:'',observaciones:'',
      estado:'borrador',fecha_cierre:null,items:[],
      aiu_override:{activo:false,pct_a:0,pct_i:0,pct_u:0,iva_pct:19},
      factores_snap:(data.factoresPrestaciones||[]).map(function(f){return Object.assign({},f)}),
      cargos_snap:(data.cargos||[]).map(function(c){return Object.assign({},c)}),
      insumos_snap:(data.insumos||[]).map(function(i){return Object.assign({},i)}),
      equipos_snap:(data.equipos||[]).map(function(e){return Object.assign({},e)}),
      apus_snap:[]
    };
    var n=presupuestos.concat([nuevo]);
    onChange(Object.assign({},data,{presupuestos:n}));
    showToast('Sub-proyecto '+nuevo.codigo+' creado',{type:'ok',dur:2000});
  }

  async function delPresupuesto(idx){
    if(idx===null||idx===undefined||!presupuestos[idx])return;
    var pres0=presupuestos[idx];
    var hijos=presupuestos.filter(function(p){return p.parent_id===pres0.id});
    var msg=hijos.length>0
      ?'¿Desea eliminar el presupuesto "'+(pres0.nombre||pres0.codigo)+'"? Tiene '+hijos.length+' sub-proyecto(s) que también se eliminarán en cascada. Esta acción no se puede deshacer.'
      :'¿Desea eliminar el presupuesto "'+(pres0.nombre||pres0.codigo)+'"? Esta acción no se puede deshacer.';
    if(!(await askConfirm(msg)))return;
    var idsEliminar={};idsEliminar[pres0.id]=true;hijos.forEach(function(h){idsEliminar[h.id]=true});
    var arr=presupuestos.filter(function(p){return !idsEliminar[p.id]});
    onChange(Object.assign({},data,{presupuestos:arr}));
    setSelPresIdx(null);
    showToast(hijos.length>0?'Presupuesto y '+hijos.length+' sub-proyecto(s) eliminados':'Presupuesto eliminado',{type:'ok',dur:2000});
  }

  function toggleEstado(idx){
    if(idx===null||idx===undefined||!presupuestos[idx])return;
    var n=presupuestos.slice();
    var p=n[idx];
    var next=p.estado==='borrador'?'en_revision':p.estado==='en_revision'?'cerrado':'borrador';
    if(p.estado==='borrador'){
      var v=validarExportacionFormulario(p);
      if(!v.valido){
        showToast('No se puede avanzar: '+v.pendientes.length+' ítem(s) sin APU asignado.',{type:'err',dur:4000});
        return;
      }
    }
    n[idx]=Object.assign({},p,{estado:next,fecha_cierre:next==='cerrado'?new Date().toISOString().slice(0,10):null});
    onChange(Object.assign({},data,{presupuestos:n}));
    showToast('Estado: '+estadoLabel(next),{type:'ok',dur:1800});
  }

  function saveEditForm(){
    if(!editPresForm||editPresForm.idx===null||editPresForm.idx===undefined)return;
    if(!editPresForm.nombre||!editPresForm.nombre.trim()){showToast('El nombre es obligatorio',{type:'err',dur:2500});return;}
    var n=presupuestos.slice();
    n[editPresForm.idx]=Object.assign({},n[editPresForm.idx],{
      nombre:editPresForm.nombre,entidad:editPresForm.entidad,contrato:editPresForm.contrato,objeto:editPresForm.objeto,
      plazo:safeFloat(editPresForm.plazo),ciudad:editPresForm.ciudad,departamento:editPresForm.departamento,
      elaborado_por:editPresForm.elaborado_por
    });
    onChange(Object.assign({},data,{presupuestos:n}));
    setEditPresForm(null);
    showToast('Informacion guardada',{type:'ok',dur:2000});
  }

  /* ── Calculo compartido de un item (usado por Items, Resumen y Entregables) ── */
  /* Memoizado por presupuesto seleccionado: solo se recalcula cuando cambian los items,
     el override de AIU del presupuesto, o los catalogos/config de los que depende calcAPU. */
  var itemValMap=useMemo(function(){
    var map=new Map();
    var itemsArr=(pres&&pres.items)||[];
    var aiuPct=(pres&&pres.aiu_override&&pres.aiu_override.activo)?
      (safeFloat(pres.aiu_override.pct_a)||0)+(safeFloat(pres.aiu_override.pct_i)||0)+(safeFloat(pres.aiu_override.pct_u)||0):
      (safeFloat(config.pct_administracion)||0)+(safeFloat(config.pct_imprevistos)||0)+(safeFloat(config.pct_utilidad)||0);
    var snap=(pres&&pres.apus_snap)||[];
    itemsArr.forEach(function(item){
      if(!item.apu_id){map.set(item.id,{vr_unit:0,vr_total:0,apu:null,calc:null});return}
      var apu=null;
      for(var i=0;i<snap.length;i++){if(snap[i].id===item.apu_id){apu=snap[i];break}}
      if(!apu){for(var j=0;j<apus.length;j++){if(apus[j].id===item.apu_id){apu=apus[j];break}}}
      if(!apu){map.set(item.id,{vr_unit:0,vr_total:0,apu:null,calc:null});return}
      var c=calcAPU(apu,cargosCalc,equipos,insumos,abCalcList,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap);
      var vrUnit=r2(c.totalDirecto*(1+aiuPct/100));
      map.set(item.id,{vr_unit:vrUnit,vr_total:r2(vrUnit*safeFloat(item.cantidad)),apu:apu,calc:c});
    });
    return map;
  },[pres&&pres.items,pres&&pres.aiu_override,pres&&pres.apus_snap,apus,cargosCalc,equipos,insumos,abCalcList,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap,config.pct_administracion,config.pct_imprevistos,config.pct_utilidad]);

  function calcItemVal(item){
    return itemValMap.get(item.id)||{vr_unit:0,vr_total:0,apu:null,calc:null};
  }

  /* ── Resumen financiero completo del presupuesto seleccionado ── */
  var resumenPres=useMemo(function(){
    var itemsArr=(pres&&pres.items)||[];
    var cdTotal=0;var catDistrib={};
    for(var i=0;i<itemsArr.length;i++){
      var cv=calcItemVal(itemsArr[i]);
      cdTotal+=cv.vr_total;
      if(cv.apu){var cat=cv.apu.categoria||'Sin categoria';catDistrib[cat]=(catDistrib[cat]||0)+cv.vr_total}
    }
    var useOv=pres&&pres.aiu_override&&pres.aiu_override.activo;
    var pctA=useOv?(safeFloat(pres.aiu_override.pct_a)||0):(safeFloat(config.pct_administracion)||0);
    var pctI=useOv?(safeFloat(pres.aiu_override.pct_i)||0):(safeFloat(config.pct_imprevistos)||0);
    var pctU=useOv?(safeFloat(pres.aiu_override.pct_u)||0):(safeFloat(config.pct_utilidad)||0);

  function calcItemValFor(item,p){
    if(!item.apu_id)return{vr_unit:0,vr_total:0,apu:null,calc:null};
    var snap=(p&&p.apus_snap)||[];
    var apu=null;
    for(var i=0;i<snap.length;i++){if(snap[i].id===item.apu_id){apu=snap[i];break}}

  }

  function calcResumenFor(p){

    for(var i=0;i<itemsArrP.length;i++){cdTotal+=calcItemValFor(itemsArrP[i],p).vr_total}

    var pctA=useOv?(safeFloat(p.aiu_override.pct_a)||0):(safeFloat(config.pct_administracion)||0);
    var pctI=useOv?(safeFloat(p.aiu_override.pct_i)||0):(safeFloat(config.pct_imprevistos)||0);
    var pctU=useOv?(safeFloat(p.aiu_override.pct_u)||0):(safeFloat(config.pct_utilidad)||0);
    var ivaPct=useOv?(safeFloat(p.aiu_override.iva_pct)||19):19;
    var adm=r2(cdTotal*pctA/100),imp=r2(cdTotal*pctI/100),uti=r2(cdTotal*pctU/100);
    var aiuTotal=r2(adm+imp+uti);
    var ivaUtilidad=r2(uti*ivaPct/100);
