*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{

--bg:#060810;--bg2:#0D1525;--bg3:#131A2B;--bg4:#1A2438;

--bd:#1E2B42;--bd2:#1B2840;--bd3:#0F1A2E;--bdr:#2A3A55;

--tx:#DDE4F0;--tx2:#8A9BB8;--tx3:#4A5978;

--ac:#4D8FF7;--ac2:#3A7AE0;--warn:#E8A830;--err:#E84848;--ok:#34C759;

--xl-hd:#0C1320;--xl-hd-tx:#6B7FA0;--xl-rn:#0A1019;--xl-rn-tx:#3A4A64;

}

html,body{height:100%;overflow:hidden}

body{background:var(--bg);color:var(--tx);font-family:'JetBrains Mono',monospace;font-size:11px}

#root{height:100%;display:flex;flex-direction:column}

::-webkit-scrollbar{width:5px;height:5px}

::-webkit-scrollbar-track{background:var(--bg2)}

::-webkit-scrollbar-thumb{background:#4ade80;border-radius:3px}

::-webkit-scrollbar-thumb:hover{background:#22c55e}



.topbar{flex-shrink:0;height:38px;background:linear-gradient(90deg,var(--bg),var(--bg2));border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:10px}

.topbar .logo{font-family:'Bebas Neue',sans-serif;font-size:17px;letter-spacing:2px}

.topbar .logo .c1{color:var(--ac)}

.topbar .logo .c2{color:var(--tx)}

.topbar .badge{font-family:'JetBrains Mono',monospace;font-size:7px;background:var(--bg3);border:1px solid var(--bd);padding:1px 7px;border-radius:10px;color:var(--tx3);letter-spacing:.5px}



.tabbar{flex-shrink:0;display:flex;background:var(--bg2);border-bottom:1px solid var(--bd);padding:0 8px;gap:2px;overflow-x:auto}

.tabbar button{background:none;border:none;border-bottom:2px solid transparent;color:var(--tx2);font-family:'JetBrains Mono',monospace;font-size:11px;padding:10px 16px;cursor:pointer;white-space:nowrap;transition:all .12s;letter-spacing:.5px;font-weight:500;display:inline-flex;align-items:center;gap:6px}

.tabbar button:hover{color:var(--ac);background:rgba(77,143,247,.06)}

.tabbar button.active{color:var(--ac);border-bottom-color:var(--ac);background:rgba(77,143,247,.08)}

.sec-bar button.active{color:#4ade80!important;border-bottom-color:#4ade80!important;background:rgba(74,222,128,.08)!important}

.sec-bar button.active svg{stroke:#4ade80!important}



.main{flex:1;overflow:hidden;padding:12px 16px}



.sec-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px;padding:0 2px}

.sec-hdr .title{font-family:'Inter',sans-serif;font-size:24px;font-weight:700;color:var(--ac);letter-spacing:1px}

.sec-hdr .info{font-size:9px;color:var(--tx3)}

.sec-hdr .info b{color:var(--warn)}



.xl-wrap{border:1px solid var(--bdr);border-radius:var(--r);overflow:hidden;background:var(--bg2);margin-bottom:10px}

.xl-scroll{overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 200px);position:relative}

.xl-scroll table{border-collapse:separate;border-spacing:0}

.xl-scroll table thead{position:sticky;top:0;z-index:2}

.xl-scroll table thead th{border-bottom:1px solid var(--bdr)}

.xl-scroll table tbody tr:last-child td{background:var(--bg3)}

.xl-scroll::-webkit-scrollbar{width:5px;height:5px}

.xl-scroll::-webkit-scrollbar-track{background:var(--bg3)}

.xl-scroll::-webkit-scrollbar-thumb{background:#4ade80;border-radius:3px}

.xl-foot{display:flex;align-items:center;gap:6px;padding:6px 8px;border-top:1px solid var(--bdr);background:var(--bg3);overflow:hidden;flex-shrink:0}



table{width:100%;border-collapse:collapse;font-family:'Inter',sans-serif;font-size:11px;table-layout:fixed}



colgroup .col-rn{width:30px}



th{background:var(--xl-hd);color:var(--tx2);font-family:'Inter',sans-serif;font-size:11px;font-weight:700;letter-spacing:.8px;padding:5px 6px;text-align:center;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);white-space:nowrap;user-select:none}

th.col-rn{background:var(--xl-rn);color:var(--xl-rn-tx);text-align:center;border-right:2px solid var(--bd)}

th.col-act{background:var(--xl-rn);letter-spacing:.8px;padding:4px 6px;width:80px;overflow:visible;text-align:center}

.sub-sec table th{padding:4px 6px}

.sub-sec table td.col-act{width:80px}



td{padding:0;height:24px;font-family:'Inter',sans-serif;border-right:1px solid var(--bdr);border-bottom:1px solid var(--bdr);vertical-align:middle;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

td:last-child{border-right:none}

td.col-rn{background:var(--xl-rn);color:var(--xl-rn-tx);text-align:center;font-family:'Inter',sans-serif;font-size:11px;font-weight:700;border-right:2px solid var(--bd);padding:0 2px;user-select:none}

td.col-act{padding:0;white-space:nowrap;width:80px;text-align:center;vertical-align:middle}



tr:nth-child(even) td{background:var(--xl-row-alt)}

tr:hover td{background:var(--xl-hover)!important}

tr:hover td.col-rn{background:var(--bg4)!important}

tr:hover td.col-act{background:transparent!important}



td.xl-ro-pct{padding:0 6px;text-align:right;font-size:10px;color:var(--warn);font-weight:500}



.ni{background:transparent;border:none;color:var(--tx);font-family:'Inter',sans-serif;font-size:11px;padding:0 6px;width:100%;height:24px;outline:none;transition:background .1s}

.ni:focus{background:var(--xl-focus);box-shadow:inset 0 0 0 1.5px var(--ac)}

select.ni{background:var(--bg3);border:1px solid var(--tx2);border-radius:4px;cursor:pointer}

select.ni option{background:var(--bg3);color:var(--tx);padding:4px 8px}

.ni[type=number]{text-align:right;-moz-appearance:textfield}

.ni[type=number]::-webkit-inner-spin-button,.ni[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0}



.sel{background:transparent;border:none;color:var(--tx);font-family:'Inter',sans-serif;font-size:11px;padding:0 4px;height:24px;outline:none;width:100%;cursor:pointer;-webkit-appearance:none}

.sel:focus{background:var(--xl-focus);box-shadow:inset 0 0 0 1.5px var(--ac)}

.sel option{background:var(--bg3);color:var(--tx)}

.toast.toast-err{border-color:var(--err);color:var(--err)}

.toast.toast-ok{border-color:var(--ok);color:var(--ok)}

.btn-del:hover{opacity:1;background:rgba(232,72,72,.1);border-radius:3px}

.btn-edit{border:none;background:none;padding:2px;cursor:pointer;opacity:.8;transition:opacity .1s;line-height:1;display:inline-flex;align-items:center;justify-content:center}

.btn-edit:hover{opacity:1;background:rgba(232,168,48,.1);border-radius:3px}



.f1{flex:1}



.mn8{font-size:8px}

.c-tx3{color:var(--tx3)}.c-warn{color:var(--warn)}.c-ok{color:var(--ok)}



.banner{background:var(--bg3);border:1px solid var(--bdr);border-radius:var(--r);padding:6px 10px;margin-bottom:8px;font-size:9px;color:var(--tx2);line-height:1.4}



.sub-sec{margin:6px 0;border:1px solid var(--bdr);border-radius:0;border-right:none}

.sub-tbl-wrap{overflow:visible}

.sub-sec .sub-tbl-wrap table thead{position:static !important;z-index:auto !important}

.sub-sec table tr:last-child td{border-bottom:none}

.sub-sec .sub-tbl-wrap table td.col-act,.sub-sec .sub-tbl-wrap table th.col-act{border-right:1px solid var(--bdr)}



.empty-row td{color:var(--tx3);font-style:italic;font-size:9px;text-align:center;height:28px;background:var(--bg2)!important}



.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;display:flex;align-items:center;justify-content:center}

.modal-box{background:var(--bg2);border:1px solid var(--bd);border-radius:var(--r);padding:0;max-width:90vw;max-height:85vh;display:flex;flex-direction:column;overflow:hidden}

.modal-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:1px solid var(--bdr);background:var(--bg3)}

.modal-hdr .title{font-family:'Inter',sans-serif;font-size:16px;font-weight:700;color:var(--ac)}

.modal-body{flex:1;overflow:auto;padding:10px 14px}

.modal-foot{display:flex;align-items:center;justify-content:flex-end;gap:8px;padding:10px 14px;border-top:1px solid var(--bdr);background:var(--bg3)}

const safeFloat=v=>{const s=String(v).replace(/,/g,'.');if(s===''||s==='.'||s==='-')return s;const n=parseFloat(s);return isNaN(n)?0:n};

const numVal=(v,fmt)=>{const s=String(v).replace(/,/g,'.');if(s===''||s==='.'||s==='-')return s;const n=parseFloat(s);if(isNaN(n))return s;return fmt?n.toLocaleString('en-US'):String(v)};

const fmt=(v,d=2)=>{const n=Number(v);return isNaN(n)?'0.00':n.toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d})};

const r2=v=>Math.round(v*100)/100;

/* Constantes compartidas de estilo para exportaciones XLSX (evita redefinir en cada Tab) */
const XLS_NUM_FMT='#,##0.00';
const XLS_HDR_FILL={fgColor:{rgb:'1A2438'}};
const XLS_HDR_FONT={bold:true,color:{rgb:'FFFFFF'},sz:9};

const MONTHS=['ene','feb','mar','abr','may','jun','jul','ago','sep','oct','nov','dic'];

const fmtDate=function(v){if(!v||v==='')return'\u2014';var s=String(v).trim();var d;

  if(/^\d{4}-\d{2}-\d{2}$/.test(s)){d=new Date(s+'T00:00:00')}

  else if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){var p=s.split('/');d=new Date(p[2],p[1]-1,p[0])}

  else if(/^\d{2}\/\d{2}\/\d{2}$/.test(s)){var p=s.split('/');d=new Date(2000+parseInt(p[2]),p[1]-1,p[0])}

  else if(/^\d{1,2}-[a-z]{3}-\d{2,4}$/i.test(s)){d=new Date(s)}

  else if(!isNaN(Number(v))&&Number(v)>1000000000000){d=new Date(Number(v))}

  else if(!isNaN(Number(s))&&Number(s)>40000&&Number(s)<60000){d=new Date((Number(s)-25569)*86400000)}

  else{d=new Date(s)}

  if(isNaN(d.getTime()))return s;

  var dd=String(d.getDate()).padStart(2,'0');var mm=MONTHS[d.getMonth()];var yy=String(d.getFullYear()).slice(2);

  return dd+'-'+mm+'-'+yy};



function NumInput({value,onChange,decimals,format,placeholder,...rest}){

  var [raw,setRaw]=useState(null);

  var [focused,setFocused]=useState(false);

  var isEmpty=!focused&&raw===null&&(value===0||value===null||value===undefined||value==='');

  var displayVal=raw!==null?raw:(focused?String(value):(format?fmt(value,typeof decimals==='number'?decimals:2):(typeof decimals==='number'?Number(value).toFixed(decimals):numVal(value,true))));

  var handleChange=function(e){

    var nv=e.target.value;

    var parsed=safeFloat(nv);

    var isIncomplete=typeof nv==='string'&&(/[\.,-]$/.test(nv)||nv==='-'||nv==='+'||nv==='');

    setRaw(isIncomplete?nv:(typeof parsed==='string'?nv:null));

    if(!isIncomplete)onChange(parsed);

  };

  var handleBlur=function(){setRaw(null);setFocused(false)};

  var handleFocus=function(e){setFocused(true);e.target.select()};

  if(placeholder)return <div style={{position:'relative',display:'inline-block',width:'100%'}}><input className="ni" value={isEmpty?'':displayVal} onChange={handleChange} onBlur={handleBlur} onFocus={handleFocus} {...rest}/>{isEmpty&&<span style={{position:'absolute',left:0,right:0,top:0,bottom:0,display:'flex',alignItems:'center',justifyContent:'center',fontSize:10,color:'var(--warn)',pointerEvents:'none',fontWeight:700}}>{placeholder}</span>}</div>;

  return <input className="ni" value={displayVal} onChange={handleChange} onBlur={handleBlur} onFocus={handleFocus} {...rest}/>;

}

function cargoJornal(cargo,usarFP,esHa){if(!cargo)return 0;if(esHa){return usarFP?(cargo.costo_base_hora||0):(cargo.costo_total_hora||0)}return usarFP?(cargo.costo_base_dia||cargo.costo_total_dia||0):(cargo.costo_total_dia||0)}

function calcAPU(a,cargosCalc,equipos,insumos,allCalc,herrPct,factorPrest,usarFP,esHa,cargoMapIn,eqMapIn,insMapIn){

  var cargoMap=cargoMapIn||new Map(cargosCalc.map(function(c){return [c.id,c]}));

  var eqMap=eqMapIn||new Map(equipos.map(function(e){return [e.id,e]}));

  var insMap=insMapIn||new Map(insumos.map(function(x){return [x.id,x]}));

  var abMap=Array.isArray(allCalc)?new Map(allCalc.map(function(b){return [b.id,b]})):null;

  var subMO=r2((a.recursos_mo||[]).reduce(function(s,r){

    var cargo=cargoMap.get(r.cargo_id);

    if(!cargo)return s;

    var costoUnitario=cargoJornal(cargo,usarFP,esHa);

    return s+costoUnitario*safeFloat(r.cant_personas)*safeFloat(r.rendimiento);

  },0));

  var herr=r2(subMO*(herrPct/100));

  var subEq=r2((a.recursos_eq||[]).reduce(function(s,r){

    var eq=eqMap.get(r.equipo_id);

    return s+(eq?safeFloat(eq.costo_hora)*safeFloat(r.rendimiento):0);

  },0));

  var subIns=r2((a.recursos_ins||[]).reduce(function(s,r){

    var ins=insMap.get(r.insumo_id);

    var costoU=0;

    if(ins){

      if(ins.origen==='Preparado en obra'){

        var ref=abMap?abMap.get(ins.apu_basico_id):null;

        costoU=ref?ref.costo_unitario:0;

      }else{costoU=ins.costo_unitario;}

    }

    var consumo=safeFloat(r.consumo)||1;

    var desp=(safeFloat(r.desperdicios_pct)||5)/100;

    return s+costoU*consumo*(1+desp);

  },0));

  var subTrans=r2((a.recursos_transporte||[]).reduce(function(s,r){

    return s+(r.unidad==='Global'?safeFloat(r.tarifa):safeFloat(r.tarifa)*safeFloat(r.distancia_km));

  },0));

  var vrPrest=usarFP?r2(subMO*(safeFloat(factorPrest)/100)):0;

  var subPers=r2(subMO+vrPrest);

  var totalDirecto=r2(subEq+subIns+subTrans+subPers);

  return{id:a.id,subMO,herr,subEq,subIns,subTrans,vrPrest,subPers,totalDirecto,costo_unitario:totalDirecto};

}

  function checkRef(key,val){

    var ins=data.insumos||[];

    var eqs=data.equipos||[];

    var apusA=data.apus||[];

    var eI=0,eE=0,eA=0;

    if(key==='categorias_insumo'||key==='unidades'||key==='origenes'){

      for(var i=0;i<ins.length;i++){

        if(key==='categorias_insumo'&&ins[i].categoria===val)eI++;

        if(key==='unidades'&&ins[i].unidad===val)eI++;

        if(key==='origenes'&&ins[i].origen===val)eI++;

      }

    }

    if(key==='tipos_equipo'||key==='unidades'){

      for(var j=0;j<eqs.length;j++){

        if(key==='tipos_equipo'&&eqs[j].tipo===val)eE++;

        if(key==='unidades'&&eqs[j].unidad===val)eE++;

      }

    }

    if(key==='unidades'||key==='unidades_transporte'){

      for(var a=0;a<apusA.length;a++){

        if(key==='unidades'&&apusA[a].unidad===val)eA++;

        (apusA[a].recursos_transporte||[]).forEach(function(r){if(key==='unidades_transporte'&&r.unidad===val)eA++});

      }

          }

    if(key==='categorias_apu'){

      for(var a2=0;a2<apusA.length;a2++){if(apusA[a2].categoria===val)eA++}

      

    }

    var total=eI+eE+eA;

    if(total>0){

      var parts=[];

      if(eI>0)parts.push(eI+' insumo'+(eI>1?'s':''));

      if(eE>0)parts.push(eE+' equipo'+(eE>1?'s':''));

      if(eA>0)parts.push(eA+' APU');

      

      return'"'+val+'" se usa en '+parts.join(', ')+'. No se puede eliminar.';

    }

    return null;

  }

/* ══════════════════ 2. ITEMS Y CAPITULOS (sub-componente de PresupuestosTab) ══════════════════ */
function PresItemsPanel({pres,presupuestos,selPresIdx,data,onChange,apuModal,setApuModal,apus,categorias_apu,calcItemVal,setTab,estadoLabel}){
  if(!pres)return <div style={{padding:'40px',textAlign:'center',color:'var(--tx3)',fontSize:13,border:'1px dashed var(--bdr)',borderRadius:4}}>Selecciona un presupuesto en "Proyectos".</div>;
  var readOnly=pres.estado!=='borrador';

  var addItem=function(){
    if(readOnly)return;
    var arr=pres.items.slice();
    arr.push({id:uid(),num_item:String(arr.length+1),capitulo:'',descripcion:'',unidad:'un',cantidad:1,apu_id:null,vr_unitario:0,vr_total:0,tiene_apu:false,alerta_sin_apu:false});
    var n=presupuestos.slice();n[selPresIdx]=Object.assign({},n[selPresIdx],{items:arr});
    onChange(Object.assign({},data,{presupuestos:n}));
  };
  var delItem=function(i){
    if(readOnly)return;if(!confirm('Eliminar item?'))return;
    var arr=pres.items.filter(function(_,j){return j!==i});
    var n=presupuestos.slice();n[selPresIdx]=Object.assign({},n[selPresIdx],{items:arr});
    onChange(Object.assign({},data,{presupuestos:n}));
  };
  var updItem=function(i,k,v){
    if(readOnly)return;
    var arr=pres.items.slice();arr[i]=Object.assign({},arr[i]);arr[i][k]=v;
    var n=presupuestos.slice();n[selPresIdx]=Object.assign({},n[selPresIdx],{items:arr});
    onChange(Object.assign({},data,{presupuestos:n}));
  };
  var openApuModal=function(i){if(!readOnly)setApuModal({open:true,itemIdx:i,search:'',catFilter:''})};
  var closeApuModal=function(){setApuModal({open:false,itemIdx:null,search:'',catFilter:''})};
  var filteredApus=function(){
    if(!apuModal.open)return[];
    var sn=apuModal.search?norm(apuModal.search):'';
    var cf=apuModal.catFilter;
    var result=[];
    for(var i=0;i<apus.length;i++){
      var a=apus[i];
      if(cf&&((a.categoria||'')!==cf))continue;
      if(sn){
        var aCod=norm(a.codigo||''),aNom=norm(a.nombre||''),aCat=norm(a.categoria||'');
        if(aCod.indexOf(sn)<0&&aNom.indexOf(sn)<0&&aCat.indexOf(sn)<0)continue;
      }
      result.push(a);
    }
    return result;
  };
  var assignApu=function(aid){
    if(apuModal.itemIdx===null||aid===undefined)return;
    var i=apuModal.itemIdx;
    var arr=pres.items.slice();
    arr[i]=Object.assign({},arr[i],{apu_id:aid,tiene_apu:true,alerta_sin_apu:false});
    var n=presupuestos.slice();n[selPresIdx]=Object.assign({},n[selPresIdx],{items:arr});
    onChange(Object.assign({},data,{presupuestos:n}));
    closeApuModal();
    showToast('APU asignado',{type:'ok',dur:2000});
  };
  var unassignApu=function(i){
    if(readOnly)return;if(!confirm('Quitar APU?'))return;
    var arr=pres.items.slice();arr[i]=Object.assign({},arr[i],{apu_id:null,tiene_apu:false});
    var n=presupuestos.slice();n[selPresIdx]=Object.assign({},n[selPresIdx],{items:arr});
    onChange(Object.assign({},data,{presupuestos:n}));
    showToast('APU removido',{type:'ok',dur:2000});
  };
  var itemsArr=pres.items||[];
  var cdTotal=0;
  for(var i=0;i<itemsArr.length;i++){cdTotal+=calcItemVal(itemsArr[i]).vr_total}

  return(
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div className="sec-hdr" style={{border:'1px solid var(--bdr)',borderRadius:4,padding:'6px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span className="title" style={{fontSize:15}}>Items: {pres.codigo}</span>
        <span style={{fontSize:10,color:'var(--tx3)'}}>{itemsArr.length} items &middot; CD: {fmt(cdTotal)}</span>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        {!readOnly&&<button className="btn" onClick={addItem} style={{fontSize:10,padding:'4px 10px',border:'1px solid var(--ok)',borderRadius:4,background:'rgba(74,222,128,.06)',color:'var(--ok)',cursor:'pointer'}}>+ Item</button>}
        <button className="btn" onClick={function(){setTab(9)}} style={{fontSize:10,padding:'4px 10px',border:'1px solid var(--bdr)',borderRadius:4,background:'none',color:'var(--tx2)',cursor:'pointer'}}>{'< Proyectos'}</button>
        <button className="btn" onClick={function(){setTab(11)}} style={{fontSize:10,padding:'4px 10px',border:'1px solid var(--ac)',borderRadius:4,background:'rgba(77,143,247,.06)',color:'var(--ac)',cursor:'pointer'}}>{'Resumen >'}</button>
        {readOnly&&<span style={{fontSize:10,color:'var(--warn)',marginLeft:8,padding:'2px 8px',border:'1px solid var(--warn)',borderRadius:3}}>Solo lectura (presupuesto {estadoLabel(pres.estado).toLowerCase()})</span>}
      </div>
      <div className="xl-wrap">
        <div className="xl-scroll">
          <table style={{tableLayout:'fixed',width:'100%',fontSize:10}}>
            <colgroup>
              <col className="cw-40"/><col className="cw-50"/><col className="cw-110"/><col className="cw-200"/><col className="cw-50"/><col className="cw-70"/><col className="cw-150"/><col className="cw-90"/><col className="cw-90"/><col className="cw-50"/>
            </colgroup>
            <thead><tr><th>#</th><th>Item</th><th>Capitulo</th><th>Descripcion</th><th>UN</th><th>Cant.</th><th>APU</th><th>Vr. Unit</th><th>Vr. Total</th><th className="col-act">Acc</th></tr></thead>
            <tbody>
              {itemsArr.length===0&&<tr className="empty-row"><td colSpan={10}>Sin items.{!readOnly&&' Agrega con "+ Item"'}</td></tr>}
              {itemsArr.map(function(it,i){
                var c=calcItemVal(it);
                var apu=c.apu;
                return(
                  <tr key={it.id}>
                    <td style={{textAlign:'center',color:'var(--tx3)'}}>{i+1}</td>
                    <td>{readOnly?it.num_item:<input className="ni" value={it.num_item} onChange={function(e){updItem(i,'num_item',e.target.value)}} style={{width:'100%',fontSize:10}}/>}</td>
                    <td>{readOnly?it.capitulo:<input className="ni" value={it.capitulo} onChange={function(e){updItem(i,'capitulo',e.target.value)}} style={{width:'100%',fontSize:10}} placeholder="1.1"/>}</td>
                    <td>{readOnly?it.descripcion:<input className="ni" value={it.descripcion} onChange={function(e){updItem(i,'descripcion',e.target.value)}} style={{width:'100%',fontSize:10}} placeholder="Descripcion"/>}</td>
                    <td>{readOnly?it.unidad:<input className="ni" value={it.unidad} onChange={function(e){updItem(i,'unidad',e.target.value)}} style={{width:'100%',fontSize:10}}/>}</td>
                    <td>{readOnly?it.cantidad:<NumInput step=".01" inputMode="decimal" value={it.cantidad} onChange={function(v){updItem(i,'cantidad',v)}} style={{width:'100%',fontSize:10,textAlign:'right'}} decimals={4}/>}</td>
                    <td style={{textAlign:'center'}}>
                      {apu?(
                        <span style={{display:'inline-flex',alignItems:'center',gap:4}}>
                          <span style={{fontSize:9,color:'var(--ok)',fontWeight:600}}>{apu.codigo}</span>
                          {!readOnly&&<button onClick={function(){unassignApu(i)}} title="Quitar APU" style={{background:'none',border:'none',color:'#f87171',cursor:'pointer',padding:0,fontSize:11}}>x</button>}
                        </span>
                      ):(
                        !readOnly?<button onClick={function(){openApuModal(i)}} style={{fontSize:9,padding:'2px 6px',border:'1px dashed var(--ac)',borderRadius:3,background:'rgba(77,143,247,.06)',color:'var(--ac)',cursor:'pointer'}}>asignar</button>:<span style={{color:'var(--tx3)'}}>-</span>
                      )}
                    </td>
                    <td style={{textAlign:'right'}}>{apu?fmt(c.vr_unit):'-'}</td>
                    <td style={{textAlign:'right',fontWeight:600}}>{apu?fmt(c.vr_total):'-'}</td>
                    <td className="col-act" style={{textAlign:'center'}}>{!readOnly&&<button className="btn-del" onClick={function(){delItem(i)}} title="Eliminar" style={{background:'none',border:'none',cursor:'pointer',padding:0}}><IconDel/></button>}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>
      {apuModal.open&&(
        <div className="modal-overlay" onClick={closeApuModal}>
          <div className="modal-box" style={{width:760}} onClick={function(e){e.stopPropagation()}}>
            <div className="modal-hdr"><span className="title">Asignar APU al item</span><button onClick={closeApuModal} style={{background:'none',border:'none',cursor:'pointer',padding:2,color:'var(--ok)'}}><IconX/></button></div>
            <div className="modal-body" style={{display:'flex',flexDirection:'column',gap:8}}>
              <div style={{display:'flex',gap:6,alignItems:'center'}}>
                <select className="ni" value={apuModal.catFilter} onChange={function(e){setApuModal(Object.assign({},apuModal,{catFilter:e.target.value}))}} style={{width:200,height:22,fontSize:11,border:'1px solid var(--ac)',borderRadius:4}}>
                  <option value=''>Todas las categorias</option>
                  {(categorias_apu||[]).map(function(c){return <option key={c.codigo} value={c.categoria}>{c.categoria}</option>})}
                </select>
                <input className="ni" placeholder="Buscar APU..." value={apuModal.search} onChange={function(e){setApuModal(Object.assign({},apuModal,{search:e.target.value}))}} style={{flex:1,height:22,fontSize:11,border:'1px solid var(--ok)',borderRadius:4}} autoFocus/>
              </div>
              <div className="xl-scroll" style={{maxHeight:380,overflowY:'auto',border:'1px solid var(--bdr)',borderRadius:4}}>
                <table style={{tableLayout:'fixed',width:'100%',fontSize:10}}>
                  <colgroup><col className="cw-90"/><col className="cw-260"/><col className="cw-190"/><col className="cw-60"/><col className="cw-80"/></colgroup>
                  <thead style={{position:'sticky',top:0,background:'var(--bg3)'}}><tr><th>Codigo</th><th>Nombre</th><th>Categoria</th><th>UN</th><th>Accion</th></tr></thead>
                  <tbody>
                    {filteredApus().length===0&&<tr><td colSpan={5} style={{textAlign:'center',padding:'20px',color:'var(--tx3)'}}>Sin resultados</td></tr>}
                    {filteredApus().map(function(a){return(
                      <tr key={a.id}>
                        <td style={{fontWeight:600,color:'var(--ac)'}}>{a.codigo||'-'}</td>
                        <td>{a.nombre||'-'}</td>
                        <td style={{color:'var(--tx2)'}}>{a.categoria||'-'}</td>
                        <td style={{textAlign:'center'}}>{a.unidad||'-'}</td>
                        <td style={{textAlign:'center'}}><button onClick={function(){assignApu(a.id)}} style={{fontSize:10,padding:'2px 8px',border:'1px solid var(--ok)',borderRadius:3,background:'rgba(74,222,128,.08)',color:'var(--ok)',cursor:'pointer',fontWeight:600}}>Seleccionar</button></td>
                      </tr>
                    )})}
                  </tbody>
                </table>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ══════════════════ 3. RESUMEN FINANCIERO (sub-componente de PresupuestosTab) ══════════════════ */
function PresResumenPanel({pres,presupuestos,selPresIdx,data,onChange,calcResumenPres,setTab}){
  if(!pres)return <div style={{padding:'40px',textAlign:'center',color:'var(--tx3)',fontSize:13,border:'1px dashed var(--bdr)',borderRadius:4}}>Selecciona un presupuesto en "Proyectos".</div>;
  var readOnly=pres.estado!=='borrador';
  var r=calcResumenPres();
  var useOv=pres.aiu_override&&pres.aiu_override.activo;

  var updOv=function(k,v){
    if(readOnly)return;
    var n=presupuestos.slice();
    n[selPresIdx]=Object.assign({},n[selPresIdx]);
    n[selPresIdx].aiu_override=Object.assign({},n[selPresIdx].aiu_override);
    n[selPresIdx].aiu_override[k]=v;
    onChange(Object.assign({},data,{presupuestos:n}));
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div className="sec-hdr" style={{border:'1px solid var(--bdr)',borderRadius:4,padding:'6px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span className="title" style={{fontSize:15}}>Resumen: {pres.codigo}</span>
        <span style={{fontSize:10,color:'var(--tx3)'}}>{r.itemsArr.length} items &middot; CD: {fmt(r.cdTotal)}</span>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <button className="btn" onClick={function(){setTab(10)}} style={{fontSize:10,padding:'4px 10px',border:'1px solid var(--bdr)',borderRadius:4,background:'none',color:'var(--tx2)',cursor:'pointer'}}>{'< Items'}</button>
        <button className="btn" onClick={function(){setTab(12)}} style={{fontSize:10,padding:'4px 10px',border:'1px solid var(--ac)',borderRadius:4,background:'rgba(77,143,247,.06)',color:'var(--ac)',cursor:'pointer'}}>{'Entregables >'}</button>
      </div>
      <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
        <div style={{width:480,border:'1px solid var(--bdr)',borderRadius:4}}>
          <div style={{padding:'6px 10px',background:'var(--bg3)',borderBottom:'1px solid var(--bdr)',fontSize:12,fontWeight:700,color:'var(--ac)'}}>RESUMEN ECONOMICO</div>
          <table style={{width:'100%',fontSize:11,tableLayout:'fixed'}}>
            <colgroup><col className="cw-280"/><col className="cw-100"/><col className="cw-100"/></colgroup>
            <tbody>
              <tr><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>Costo Directo Total</td><td style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--bdr)',fontWeight:600}}>{fmt(r.cdTotal)}</td><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}/></tr>
              <tr><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>Administracion ({r.pctA.toFixed(2)}%)</td><td style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>{fmt(r.adm)}</td><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}/></tr>
              <tr><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>Imprevistos ({r.pctI.toFixed(2)}%)</td><td style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>{fmt(r.imp)}</td><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}/></tr>
              <tr><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>Utilidad ({r.pctU.toFixed(2)}%)</td><td style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>{fmt(r.uti)}</td><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}/></tr>
              <tr style={{background:'var(--bg2)'}}><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)',fontWeight:700}}>AIU Total ({r.aiuPct.toFixed(2)}%)</td><td style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--bdr)',fontWeight:700,color:r.aiuWarn?'var(--warn)':'var(--ok)'}}>{fmt(r.aiuTotal)}</td><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}/></tr>
              <tr><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>IVA sobre Utilidad ({r.ivaPct}%)</td><td style={{textAlign:'right',padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}>{fmt(r.ivaUtilidad)}</td><td style={{padding:'6px 10px',borderBottom:'1px solid var(--bdr)'}}/></tr>
              <tr style={{background:'var(--bg3)'}}><td style={{padding:'8px 10px',fontWeight:700,fontSize:13,color:'var(--ac)'}}>VALOR TOTAL CONTRATO</td><td style={{textAlign:'right',padding:'8px 10px',fontWeight:700,fontSize:13,color:'var(--ok)'}}>{fmt(r.valorTotal)}</td><td style={{padding:'8px 10px'}}/></tr>
            </tbody>
          </table>
        </div>
        <div style={{flex:1,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{border:'1px solid var(--bdr)',borderRadius:4}}>
            <div style={{padding:'6px 10px',background:'var(--bg3)',borderBottom:'1px solid var(--bdr)',fontSize:12,fontWeight:700,color:'var(--ac)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span>AIU Override</span>
              {!readOnly&&<label style={{display:'inline-flex',alignItems:'center',gap:4,fontSize:10,cursor:'pointer'}}><input type="checkbox" checked={useOv||false} onChange={function(e){updOv('activo',e.target.checked)}}/> Usar AIU especifico</label>}
            </div>
            {useOv?(
              <div style={{padding:'8px 10px',display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:6,fontSize:10}}>
                <div><label style={{color:'var(--tx2)',display:'block',marginBottom:2}}>Admin %</label><NumInput step=".5" inputMode="decimal" value={r.pctA} onChange={function(v){updOv('pct_a',v)}} disabled={readOnly} style={{width:'100%',fontSize:10,textAlign:'right'}} decimals={2}/></div>
                <div><label style={{color:'var(--tx2)',display:'block',marginBottom:2}}>Impr %</label><NumInput step=".5" inputMode="decimal" value={r.pctI} onChange={function(v){updOv('pct_i',v)}} disabled={readOnly} style={{width:'100%',fontSize:10,textAlign:'right'}} decimals={2}/></div>
                <div><label style={{color:'var(--tx2)',display:'block',marginBottom:2}}>Util %</label><NumInput step=".5" inputMode="decimal" value={r.pctU} onChange={function(v){updOv('pct_u',v)}} disabled={readOnly} style={{width:'100%',fontSize:10,textAlign:'right'}} decimals={2}/></div>
                <div style={{gridColumn:'1 / 4',marginTop:6,padding:'4px 6px',borderRadius:3,background:r.aiuWarn?'rgba(248,113,113,.1)':(r.cdTotal>0?'rgba(74,222,128,.06)':'var(--bg3)')}}>
                  {r.aiuPct>=5&&r.aiuPct<=50&&<span style={{fontSize:10,color:'var(--ok)',fontWeight:600}}>AIU {r.aiuPct.toFixed(2)}% OK</span>}
                  {r.aiuPct<5&&r.aiuWarn&&<span style={{fontSize:10,color:'var(--warn)',fontWeight:600}}>AIU {r.aiuPct.toFixed(2)}% - bajo 5%</span>}
                  {r.aiuPct>50&&<span style={{fontSize:10,color:'#f87171',fontWeight:600}}>AIU {r.aiuPct.toFixed(2)}% - sobre 50%</span>}
                </div>
              </div>
            ):(
              <div style={{padding:'8px 10px',fontSize:10,color:'var(--tx3)'}}>Usando AIU global ({r.pctA.toFixed(1)}%+{r.pctI.toFixed(1)}%+{r.pctU.toFixed(1)}%). Activa "Usar AIU especifico" para cambiar.</div>
            )}
          </div>
          <div style={{border:'1px solid var(--bdr)',borderRadius:4}}>
            <div style={{padding:'6px 10px',background:'var(--bg3)',borderBottom:'1px solid var(--bdr)',fontSize:12,fontWeight:700,color:'var(--ac)'}}>DISTRIBUCION POR CATEGORIA</div>
            <div style={{padding:'4px 10px',maxHeight:240,overflowY:'auto'}}>
              {r.catRows.length===0&&<div style={{textAlign:'center',padding:'20px',color:'var(--tx3)'}}>Sin items con APU.</div>}
              {r.catRows.map(function(row,i){return(
                <div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'4px 0',borderBottom:'1px dotted var(--bd)'}}>
                  <span style={{fontSize:10,flex:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{row.cat}</span>
                  <div style={{width:120,height:6,background:'var(--bg)',borderRadius:3,overflow:'hidden',border:'1px solid var(--bd)'}}><div style={{width:Math.min(100,row.pct)+'%',height:'100%',background:'var(--ac)',borderRadius:3}}/></div>
                  <span style={{fontSize:9,color:'var(--tx2)',width:50,textAlign:'right'}}>{row.pct.toFixed(1)}%</span>
                  <span style={{fontSize:9,color:'var(--tx2)',width:80,textAlign:'right',fontWeight:600}}>{fmt(row.val)}</span>
                </div>
              )})}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════ 4. EXPORTAR / ENTREGABLES (sub-componente de PresupuestosTab) ══════════════════ */
function PresEntregablesPanel({pres,calcResumenPres,calcItemVal,setTab}){
  if(!pres)return <div style={{padding:'40px',textAlign:'center',color:'var(--tx3)',fontSize:13,border:'1px dashed var(--bdr)',borderRadius:4}}>Selecciona un presupuesto en "Proyectos".</div>;
  var r=calcResumenPres();
  var itemsArr=r.itemsArr;

  var exportExcel=function(){
    if(itemsArr.length===0){showToast('El presupuesto no tiene items',{type:'err',dur:2500});return}
    var wb=XLSX.utils.book_new();
    var rows=[];
    rows.push(['PRESUPUESTO: '+(pres.nombre||pres.codigo)]);
    rows.push(['Codigo',pres.codigo,'','Entidad contratante',pres.entidad||'-']);
    rows.push(['No. Contrato',pres.contrato||'-','','Ciudad',(pres.ciudad||'-')+(pres.departamento?(' / '+pres.departamento):'')]);
    rows.push(['Objeto',pres.objeto||'-']);
    rows.push(['Elaborado por',pres.elaborado_por||'-','','Fecha',pres.fecha_creacion||'-']);
    rows.push([]);
    var hdrRowIdx=rows.length;
    rows.push(['#','Item','Capitulo','Descripcion','UN','Cantidad','APU','Vr.Unitario','Vr.Total']);
    itemsArr.forEach(function(it,i){
      var cv=calcItemVal(it);
      rows.push([i+1,it.num_item,it.capitulo,it.descripcion,it.unidad,safeFloat(it.cantidad),cv.apu?cv.apu.codigo:'-',cv.vr_unit,cv.vr_total]);
    });
    var sumStartIdx=rows.length+1;
    rows.push([]);
    rows.push(['','','','','','','','Costo Directo Total',r.cdTotal]);
    rows.push(['','','','','','','','Administracion ('+r.pctA.toFixed(2)+'%)',r.adm]);
    rows.push(['','','','','','','','Imprevistos ('+r.pctI.toFixed(2)+'%)',r.imp]);
    rows.push(['','','','','','','','Utilidad ('+r.pctU.toFixed(2)+'%)',r.uti]);
    rows.push(['','','','','','','','IVA sobre Utilidad ('+r.ivaPct+'%)',r.ivaUtilidad]);
    rows.push(['','','','','','','','VALOR TOTAL CONTRATO',r.valorTotal]);
    var ws=XLSX.utils.aoa_to_sheet(rows);
    ws['!cols']=[{wch:4},{wch:10},{wch:12},{wch:38},{wch:6},{wch:11},{wch:10},{wch:15},{wch:15}];
    ws['!merges']=[{s:{r:0,c:0},e:{r:0,c:8}},{s:{r:3,c:1},e:{r:3,c:8}}];
    if(ws['A1'])ws['A1'].s={font:{bold:true,sz:14,color:{rgb:'1A2438'}}};
    for(var rr=1;rr<=4;rr++){
      ['A','D'].forEach(function(col){var k=col+(rr+1);if(ws[k])ws[k].s={font:{bold:true,sz:9,color:{rgb:'4D8FF7'}}}});
    }
    ['A','B','C','D','E','F','G','H','I'].forEach(function(col){var k=col+(hdrRowIdx+1);if(ws[k])ws[k].s={font:XLS_HDR_FONT,fill:XLS_HDR_FILL,alignment:{horizontal:'center'}}});
    for(var ri2=hdrRowIdx+1;ri2<hdrRowIdx+1+itemsArr.length;ri2++){
      ['H','I'].forEach(function(col){var k=col+(ri2+1);if(ws[k]){ws[k].t='n';ws[k].z=XLS_NUM_FMT;ws[k].s={alignment:{horizontal:'right'}}}});
    }
    for(var rs=sumStartIdx;rs<sumStartIdx+6;rs++){
      var kh=String.fromCharCode(72)+(rs+1),ki=String.fromCharCode(73)+(rs+1);
      if(ws[kh])ws[kh].s={font:{bold:true,sz:9}};
      if(ws[ki]){ws[ki].t='n';ws[ki].z=XLS_NUM_FMT;ws[ki].s={font:{bold:true,sz:9},alignment:{horizontal:'right'}}}
    }
    var lastRow=sumStartIdx+5;
    ['H','I'].forEach(function(col){var k=col+(lastRow+1);if(ws[k])ws[k].s={font:{bold:true,sz:10,color:{rgb:'FFFFFF'}},fill:{fgColor:{rgb:'1A7A34'}},alignment:{horizontal:col==='I'?'right':'left'}}});
    XLSX.utils.book_append_sheet(wb,ws,'Presupuesto');

    var rows2=[['Item','APU','Nombre','Categoria','Mano de Obra','Equipos','Insumos','Transporte','Costo Directo Unit.','Cantidad','Vr.Total']];
    itemsArr.forEach(function(it){
      var cv=calcItemVal(it);
      if(!cv.apu)return;
      var c=cv.calc||{};
      rows2.push([it.num_item,cv.apu.codigo,cv.apu.nombre,cv.apu.categoria,c.subPers||0,c.subEq||0,c.subIns||0,c.subTrans||0,c.totalDirecto||0,safeFloat(it.cantidad),cv.vr_total]);
    });
    var ws2=XLSX.utils.aoa_to_sheet(rows2);
    ws2['!cols']=[{wch:8},{wch:10},{wch:32},{wch:18},{wch:13},{wch:12},{wch:12},{wch:12},{wch:15},{wch:10},{wch:15}];
    rows2[0].forEach(function(_,ci){var k=XLSX.utils.encode_cell({r:0,c:ci});if(ws2[k])ws2[k].s={font:XLS_HDR_FONT,fill:XLS_HDR_FILL,alignment:{horizontal:'center'}}});
    for(var ri3=1;ri3<rows2.length;ri3++){
      [4,5,6,7,8,10].forEach(function(ci){var k=XLSX.utils.encode_cell({r:ri3,c:ci});if(ws2[k]){ws2[k].t='n';ws2[k].z=XLS_NUM_FMT;ws2[k].s={alignment:{horizontal:'right'}}}});
    }
    XLSX.utils.book_append_sheet(wb,ws2,'Detalle APU');

    XLSX.writeFile(wb,'Presupuesto_'+(pres.codigo||'PPT')+'_'+new Date().toISOString().slice(0,10)+'.xlsx');
    showToast('Presupuesto exportado a Excel',{type:'ok'});
  };

  var exportPDF=function(){

    var y=88;

    doc.setFont(undefined,'bold');doc.text('Objeto:',40,y);doc.setFont(undefined,'normal');
    var objLines=doc.splitTextToSize(pres.objeto||'-',pageW-190);

    y+=Math.max(14,objLines.length*11)+10;

    var body=itemsArr.map(function(it,i){var cv=calcItemVal(it);return[i+1,it.num_item,it.descripcion,it.unidad,Number(it.cantidad).toLocaleString('en-US',{maximumFractionDigits:2}),cv.apu?cv.apu.codigo:'-','$ '+fmt(cv.vr_unit),'$ '+fmt(cv.vr_total)]});
    doc.autoTable({
      startY:y,
      head:[['#','Item','Descripcion','UN','Cant.','APU','Vr.Unit','Vr.Total']],
      body:body,theme:'grid',
      headStyles:{fillColor:[26,36,56],textColor:255,fontSize:8},
      bodyStyles:{fontSize:8},
      columnStyles:{0:{cellWidth:22},1:{cellWidth:45},2:{cellWidth:175},3:{cellWidth:35},6:{halign:'right'},7:{halign:'right'}},
      margin:{left:40,right:40}
    });

    var y2=doc.lastAutoTable.finalY+18;
    if(y2>pageH-160){doc.addPage();y2=50}
    var sumBody=[
      ['Costo Directo Total','$ '+fmt(r.cdTotal)],
      ['Administracion ('+r.pctA.toFixed(2)+'%)','$ '+fmt(r.adm)],
      ['Imprevistos ('+r.pctI.toFixed(2)+'%)','$ '+fmt(r.imp)],
      ['Utilidad ('+r.pctU.toFixed(2)+'%)','$ '+fmt(r.uti)],
      ['IVA sobre Utilidad ('+r.ivaPct+'%)','$ '+fmt(r.ivaUtilidad)],
      ['VALOR TOTAL CONTRATO','$ '+fmt(r.valorTotal)]
    ];
    doc.autoTable({
      startY:y2,body:sumBody,theme:'plain',styles:{fontSize:9},
      columnStyles:{0:{cellWidth:220,fontStyle:'bold'},1:{cellWidth:110,halign:'right'}},
      margin:{left:pageW-40-330},
      didParseCell:function(hd){if(hd.row.index===5){hd.cell.styles.fontStyle='bold';hd.cell.styles.fontSize=10;hd.cell.styles.fillColor=[26,122,52];hd.cell.styles.textColor=255}}
    });

    var y3=doc.lastAutoTable.finalY+60;
    if(y3>pageH-60){doc.addPage();y3=80}
    doc.setDrawColor(150);doc.setTextColor(0,0,0);doc.setFontSize(8);
    doc.line(40,y3,240,y3);doc.text('Firma - Elaborado por',40,y3+12);
    doc.line(pageW-240,y3,pageW-40,y3);doc.text('Firma - Aprobado',pageW-240,y3+12);

    doc.save('Presupuesto_'+(pres.codigo||'PPT')+'_'+new Date().toISOString().slice(0,10)+'.pdf');
    showToast('Presupuesto exportado a PDF',{type:'ok'});
  };

  return(
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      <div className="sec-hdr" style={{border:'1px solid var(--bdr)',borderRadius:4,padding:'6px 10px',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <span className="title" style={{fontSize:15}}>Entregables: {pres.codigo}</span>
        <span style={{fontSize:10,color:'var(--tx3)'}}>{itemsArr.length} items &middot; Valor total: {fmt(r.valorTotal)}</span>
      </div>
      <div style={{display:'flex',gap:6,alignItems:'center'}}>
        <button className="btn" onClick={function(){setTab(11)}} style={{fontSize:10,padding:'4px 10px',border:'1px solid var(--bdr)',borderRadius:4,background:'none',color:'var(--tx2)',cursor:'pointer'}}>{'< Resumen'}</button>
      </div>
      <div style={{display:'flex',gap:16,alignItems:'flex-start'}}>
        <div style={{width:340,display:'flex',flexDirection:'column',gap:10}}>
          <div style={{border:'1px solid var(--bdr)',borderRadius:4,padding:14,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--ac)'}}>EXCEL</div>
            <div style={{fontSize:10,color:'var(--tx2)',lineHeight:1.4}}>Hoja "Presupuesto" con datos del proyecto, items y resumen financiero. Hoja "Detalle APU" con el desglose de costos por item.</div>
            <button className="btn" onClick={exportExcel} style={{fontSize:11,padding:'6px 12px',border:'1px solid var(--ok)',borderRadius:4,background:'rgba(74,222,128,.08)',color:'var(--ok)',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}}><IconExport/> Exportar Excel</button>
          </div>
          <div style={{border:'1px solid var(--bdr)',borderRadius:4,padding:14,display:'flex',flexDirection:'column',gap:8}}>
            <div style={{fontSize:12,fontWeight:700,color:'var(--ac)'}}>PDF</div>
            <div style={{fontSize:10,color:'var(--tx2)',lineHeight:1.4}}>Documento con datos del proyecto, tabla de items, resumen financiero y espacio de firma, listo para entregar a la entidad contratante.</div>
            <button className="btn" onClick={exportPDF} style={{fontSize:11,padding:'6px 12px',border:'1px solid var(--ac)',borderRadius:4,background:'rgba(77,143,247,.08)',color:'var(--ac)',cursor:'pointer',display:'inline-flex',alignItems:'center',gap:6,justifyContent:'center'}}><IconExport/> Exportar PDF</button>
          </div>
          {itemsArr.length===0&&<div style={{fontSize:10,color:'var(--warn)',padding:'8px 10px',border:'1px solid var(--warn)',borderRadius:4}}>Este presupuesto no tiene items. Ve a "Items" para agregarlos antes de exportar.</div>}
        </div>
        <div style={{flex:1,border:'1px solid var(--bdr)',borderRadius:4}}>
          <div style={{padding:'6px 10px',background:'var(--bg3)',borderBottom:'1px solid var(--bdr)',fontSize:12,fontWeight:700,color:'var(--ac)'}}>VISTA PREVIA</div>
          <div style={{padding:12,fontSize:11}}>
            <div style={{fontWeight:700,fontSize:13,marginBottom:6}}>{pres.nombre||'(sin nombre)'}</div>
            <div style={{color:'var(--tx2)',marginBottom:2}}>Entidad: {pres.entidad||'-'}</div>
            <div style={{color:'var(--tx2)',marginBottom:2}}>Contrato: {pres.contrato||'-'}</div>
            <div style={{color:'var(--tx2)',marginBottom:10}}>Ciudad: {pres.ciudad||'-'}{pres.departamento?(' / '+pres.departamento):''}</div>
            <table style={{width:'100%',fontSize:10}}>
              <tbody>
                <tr><td style={{padding:'3px 0',color:'var(--tx2)'}}>Costo Directo</td><td style={{padding:'3px 0',textAlign:'right'}}>{fmt(r.cdTotal)}</td></tr>
                <tr><td style={{padding:'3px 0',color:'var(--tx2)'}}>AIU ({r.aiuPct.toFixed(2)}%)</td><td style={{padding:'3px 0',textAlign:'right'}}>{fmt(r.aiuTotal)}</td></tr>
                <tr><td style={{padding:'3px 0',color:'var(--tx2)'}}>IVA sobre Utilidad</td><td style={{padding:'3px 0',textAlign:'right'}}>{fmt(r.ivaUtilidad)}</td></tr>
                <tr style={{borderTop:'1px solid var(--bdr)'}}><td style={{padding:'6px 0',fontWeight:700,color:'var(--ac)'}}>VALOR TOTAL</td><td style={{padding:'6px 0',textAlign:'right',fontWeight:700,color:'var(--ok)'}}>{fmt(r.valorTotal)}</td></tr>
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  );
}

function PresupuestosTab({data,onChange,cargosCalc,esHora,eqMap,insMap,factorPrest,usarFpEnApu,equipos,insumos,apusBasico,categorias_apu,tab,setTab}){
  data=data||{};
  equipos=equipos||[];
  insumos=insumos||[];
  cargosCalc=cargosCalc||[];
  categorias_apu=categorias_apu||[];
  apusBasico=apusBasico||[];
  var presupuestos=data.presupuestos||[];
  var apus=data.apus||[];
  var config=data.config||{};
  var[selPresIdx,setSelPresIdx]=useState(null);
  var[editPresForm,setEditPresForm]=useState(null);
  var[apuModal,setApuModal]=useState({open:false,itemIdx:null,search:'',catFilter:''});
  var pres=(selPresIdx!==null&&presupuestos[selPresIdx])?presupuestos[selPresIdx]:null;
  var herrPct=config.herr_pct!=null?Number(config.herr_pct):5;

  var personMap=useMemo(function(){return new Map((cargosCalc||[]).map(function(c){return[c.id,c]}))},[cargosCalc]);
  var abCalcList=useMemo(function(){
    var list=[];
    (apusBasico||[]).forEach(function(a){
      list.push(calcAPU(a,cargosCalc,equipos,insumos,null,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap));
    });
    return list;
  },[apusBasico,cargosCalc,equipos,insumos,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap]);

  function estadoColor(e){return e==='borrador'?'var(--warn)':e==='en_revision'?'var(--ac)':'var(--ok)'}
  function estadoLabel(e){return e==='borrador'?'Borrador':e==='en_revision'?'En Revision':'Cerrado'}

  function genCodigoPpto(){
    var maxN=0;
    presupuestos.forEach(function(p){var m=(p.codigo||'').match(/PPT-(\d+)/);if(m)maxN=Math.max(maxN,parseInt(m[1]))});
    return 'PPT-'+String(maxN+1).padStart(3,'0');
  }

  function addPresupuesto(){
    var nuevo={
      id:uid(),codigo:genCodigoPpto(),nombre:'',entidad:'',contrato:'',objeto:'',plazo:0,
      fecha_creacion:new Date().toISOString().slice(0,10),ciudad:'',departamento:'',elaborado_por:'',
      estado:'borrador',fecha_cierre:null,items:[],
      aiu_override:{activo:false,pct_a:0,pct_i:0,pct_u:0,iva_pct:19},
      factores_snap:(data.factoresPrestaciones||[]).map(function(f){return Object.assign({},f)}),
      cargos_snap:(data.cargos||[]).map(function(c){return Object.assign({},c)})
    };
    var n=presupuestos.concat([nuevo]);
    onChange(Object.assign({},data,{presupuestos:n}));
    setSelPresIdx(n.length-1);
    showToast('Presupuesto '+nuevo.codigo+' creado',{type:'ok',dur:2000});
  }

  function delPresupuesto(idx){
    if(idx===null||idx===undefined||!presupuestos[idx])return;
    if(!confirm('Eliminar el presupuesto "'+(presupuestos[idx].nombre||presupuestos[idx].codigo)+'"? Esta accion no se puede deshacer.'))return;
    var arr=presupuestos.filter(function(_,i){return i!==idx});
    onChange(Object.assign({},data,{presupuestos:arr}));
    setSelPresIdx(null);
    showToast('Presupuesto eliminado',{type:'ok',dur:2000});
  }

  function toggleEstado(idx){
    if(idx===null||idx===undefined||!presupuestos[idx])return;
    var n=presupuestos.slice();
    var p=n[idx];
    var next=p.estado==='borrador'?'en_revision':p.estado==='en_revision'?'cerrado':'borrador';
    n[idx]=Object.assign({},p,{estado:next,fecha_cierre:next==='cerrado'?new Date().toISOString().slice(0,10):null});
    onChange(Object.assign({},data,{presupuestos:n}));
    showToast('Estado: '+estadoLabel(next),{type:'ok',dur:1800});
  }

  function saveEditForm(){
    if(!editPresForm||editPresForm.idx===null||editPresForm.idx===undefined)return;
    if(!editPresForm.nombre||!editPresForm.nombre.trim()){showToast('El nombre es obligatorio',{type:'err',dur:2500});return;}
    var n=presupuestos.slice();
    n[editPresForm.idx]=Object.assign({},n[editPresForm.idx],{
      nombre:editPresForm.nombre,entidad:editPresForm.entidad,contrato:editPresForm.contrato,objeto:editPresForm.objeto,
      plazo:safeFloat(editPresForm.plazo),ciudad:editPresForm.ciudad,departamento:editPresForm.departamento,
      elaborado_por:editPresForm.elaborado_por
    });
    onChange(Object.assign({},data,{presupuestos:n}));
    setEditPresForm(null);
    showToast('Informacion guardada',{type:'ok',dur:2000});
  }

  /* ── Calculo compartido de un item (usado por Items, Resumen y Entregables) ── */
  /* Memoizado por presupuesto seleccionado: solo se recalcula cuando cambian los items,
     el override de AIU del presupuesto, o los catalogos/config de los que depende calcAPU. */
  var itemValMap=useMemo(function(){
    var map=new Map();
    var itemsArr=(pres&&pres.items)||[];
    var aiuPct=(pres&&pres.aiu_override&&pres.aiu_override.activo)?
      (safeFloat(pres.aiu_override.pct_a)||0)+(safeFloat(pres.aiu_override.pct_i)||0)+(safeFloat(pres.aiu_override.pct_u)||0):
      (safeFloat(config.pct_administracion)||0)+(safeFloat(config.pct_imprevistos)||0)+(safeFloat(config.pct_utilidad)||0);
    itemsArr.forEach(function(item){
      if(!item.apu_id){map.set(item.id,{vr_unit:0,vr_total:0,apu:null,calc:null});return}
      var apu=null;
      for(var i=0;i<apus.length;i++){if(apus[i].id===item.apu_id){apu=apus[i];break}}
      if(!apu){map.set(item.id,{vr_unit:0,vr_total:0,apu:null,calc:null});return}
      var c=calcAPU(apu,cargosCalc,equipos,insumos,abCalcList,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap);
      var vrUnit=r2(c.totalDirecto*(1+aiuPct/100));
      map.set(item.id,{vr_unit:vrUnit,vr_total:r2(vrUnit*safeFloat(item.cantidad)),apu:apu,calc:c});
    });
    return map;
  },[pres&&pres.items,pres&&pres.aiu_override,apus,cargosCalc,equipos,insumos,abCalcList,herrPct,factorPrest,usarFpEnApu,esHora,personMap,eqMap,insMap,config.pct_administracion,config.pct_imprevistos,config.pct_utilidad]);

  function calcItemVal(item){
    return itemValMap.get(item.id)||{vr_unit:0,vr_total:0,apu:null,calc:null};
  }

  /* ── Resumen financiero completo del presupuesto seleccionado ── */
  var resumenPres=useMemo(function(){
    var itemsArr=(pres&&pres.items)||[];
    var cdTotal=0;var catDistrib={};
    for(var i=0;i<itemsArr.length;i++){
      var cv=calcItemVal(itemsArr[i]);
      cdTotal+=cv.vr_total;
      if(cv.apu){var cat=cv.apu.categoria||'Sin categoria';catDistrib[cat]=(catDistrib[cat]||0)+cv.vr_total}
    }
    var useOv=pres&&pres.aiu_override&&pres.aiu_override.activo;
    var pctA=useOv?(safeFloat(pres.aiu_override.pct_a)||0):(safeFloat(config.pct_administracion)||0);
    var pctI=useOv?(safeFloat(pres.aiu_override.pct_i)||0):(safeFloat(config.pct_imprevistos)||0);
    var pctU=useOv?(safeFloat(pres.aiu_override.pct_u)||0):(safeFloat(config.pct_utilidad)||0);
    var aiuPct=pctA+pctI+pctU;
    var ivaPct=useOv?(safeFloat(pres.aiu_override.iva_pct)||19):19;
    var adm=r2(cdTotal*pctA/100),imp=r2(cdTotal*pctI/100),uti=r2(cdTotal*pctU/100);
    var aiuTotal=r2(adm+imp+uti);
    var ivaUtilidad=r2(uti*ivaPct/100);
    var valorTotal=r2(cdTotal+aiuTotal+ivaUtilidad);
    var catKeys=Object.keys(catDistrib);
    var catRows=catKeys.map(function(k){return{cat:k,val:r2(catDistrib[k]),pct:cdTotal>0?catDistrib[k]/cdTotal*100:0}});
    catRows.sort(function(a,b){return b.val-a.val});
    return{cdTotal:cdTotal,pctA:pctA,pctI:pctI,pctU:pctU,aiuPct:aiuPct,ivaPct:ivaPct,adm:adm,imp:imp,uti:uti,aiuTotal:aiuTotal,ivaUtilidad:ivaUtilidad,valorTotal:valorTotal,catRows:catRows,aiuWarn:aiuPct>0&&(aiuPct<5||aiuPct>50),itemsArr:itemsArr};
  },[pres&&pres.items,pres&&pres.aiu_override,itemValMap,config.pct_administracion,config.pct_imprevistos,config.pct_utilidad]);

  function calcResumenPres(){return resumenPres}

  /* ══════════════════ SWITCH ENTRE SUB-PESTAÑAS (delegado a sub-componentes) ══════════════════ */
  if(tab===10)return <PresItemsPanel pres={pres} presupuestos={presupuestos} selPresIdx={selPresIdx} data={data} onChange={onChange} apuModal={apuModal} setApuModal={setApuModal} apus={apus} categorias_apu={categorias_apu} calcItemVal={calcItemVal} setTab={setTab} estadoLabel={estadoLabel}/>;
  if(tab===11)return <PresResumenPanel pres={pres} presupuestos={presupuestos} selPresIdx={selPresIdx} data={data} onChange={onChange} calcResumenPres={calcResumenPres} setTab={setTab}/>;
  if(tab===12)return <PresEntregablesPanel pres={pres} calcResumenPres={calcResumenPres} calcItemVal={calcItemVal} setTab={setTab}/>;
  return <PresProyectosPanel presupuestos={presupuestos} selPresIdx={selPresIdx} setSelPresIdx={setSelPresIdx} pres={pres} estadoColor={estadoColor} estadoLabel={estadoLabel} addPresupuesto={addPresupuesto} editPresForm={editPresForm} setEditPresForm={setEditPresForm} toggleEstado={toggleEstado} delPresupuesto={delPresupuesto} setTab={setTab} saveEditForm={saveEditForm}/>;
}

function App(){

  var[data,setData]=usePersist(defaultState());



  useEffect(function(){

    if(data.apus_basico&&data.apus_basico.length>0){

      setData(migrateApusBasico(data));

    }

  },[]);



  const{factoresPrestaciones,cargos,cuadrillas,equipos,insumos,apus,proveedores,config}=data;

  var[tab,setTab]=useState(8);

  var[mainSection,setMainSection]=useState(0);

  var[selCuadrillaIdx,setSelCuadrillaIdx]=useState(null);

  var[prevTab,setPrevTab]=useState(undefined);

  var SECTIONS=[

    {label:'Catálogos',sub:[{l:'Configuración',i:8},{l:'Colaboradores',i:0},{l:'Cuadrillas',i:1},{l:'Equipos',i:2},{l:'Insumos',i:3},{l:'Proveedores',i:4}]},

    {label:'APUs',sub:[{l:'Catálogo APU',i:6}]},

    {label:'Presupuestos',sub:[{l:'Proyectos',i:9},{l:'Items',i:10},{l:'Resumen',i:11},{l:'Entregables',i:12}]},

    {label:'Programación',sub:[]},

    {label:'Control de Costos',sub:[]},

    {label:'Reportes',sub:[]}

  ];



  useEffect(()=>{

  var h=function(e){var t=e.target;if(t.tagName!=='INPUT'||!t.classList.contains('ni')||t.getAttribute('inputMode')!=='decimal')return;if(e.key===','||e.key==='.'){e.preventDefault();var s=t.selectionStart,v=t.value;if(s===undefined)return;var nv=v.slice(0,s)+'.'+v.slice(s);t.value=nv;t.selectionStart=t.selectionEnd=s+1;t.dispatchEvent(new Event('input',{bubbles:true}))}};

    document.addEventListener('keydown',h);return function(){document.removeEventListener('keydown',h)};

  },[]);

var factorPrest=useMemo(function(){return r2(factoresPrestaciones.reduce(function(s,f){return s+safeFloat(f.factor)},0))},[factoresPrestaciones]);

  var apusBasico=useMemo(function(){return (apus||[]).filter(function(a){return a.es_basico===true})},[apus]);
    var cargosCalc=useMemo(function(){
    var sb=config.salario_base||1750905;

    var dias=config.dias_mes||30;

    var horas=config.horas_mes||182;

    var esHora=getPaisData(config.pais,(data.config_listas||{}).perfiles_pais).unidad==='hora';

    return cargos.map(function(c){

      var nsb=safeFloat(c.num_salarios_base)||0;

      var valorBasico=r2(nsb*sb);

      var vrPrest=r2(valorBasico*(factorPrest/100));

      var total=r2(valorBasico+vrPrest);

      var costoBaseDia=r2(valorBasico/dias);

      var costoBaseHora=esHora?valorBasico:r2(valorBasico/horas);

      var costoTotalDia=esHora?total:r2(total/dias);

      var costoTotalHora=esHora?total:r2(total/horas);

      return Object.assign({},c,{costo_total_dia:costoTotalDia,costo_base_dia:costoBaseDia,costo_base_hora:costoBaseHora,costo_total_hora:costoTotalHora,valorBasico:valorBasico});

    });

  },[cargos,factorPrest,config.salario_base,config.dias_mes,config.horas_mes,config.pais]);



  var cargoMap=useMemo(function(){return new Map(cargosCalc.map(function(c){return [c.id,c]}))},[cargosCalc]);

  var provMap=useMemo(function(){return new Map(proveedores.map(function(p){return [p.id,p]}))},[proveedores]);

  var esHora=getPaisData(config.pais,(data.config_listas||{}).perfiles_pais).unidad==='hora';

  var eqMap=useMemo(function(){return new Map(equipos.map(function(e){return [e.id,e]}))},[equipos]);

  var insMap=useMemo(function(){return new Map(insumos.map(function(x){return [x.id,x]}))},[insumos]);
